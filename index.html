<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>永怀堂 - 纪念寺庙</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #1a1a2e; font-family: 'KaiTi', 'STKaiti', 'PingFang SC', serif; }
        canvas { display: block; touch-action: none; }

        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a2e; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
            transition: opacity 0.8s ease;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        #loading h2 { color: #FFD700; font-size: 1.8em; letter-spacing: 0.5em; margin-bottom: 20px; }
        #loading .bar { width: 200px; height: 2px; background: rgba(255,215,0,0.2); border-radius: 1px; overflow: hidden; }
        #loading .bar-fill { width: 0%; height: 100%; background: #FFD700; transition: width 0.3s; }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%;
            pointer-events: none; z-index: 10; text-align: center; padding: 16px;
        }
        #overlay h1 {
            color: #FFD700; font-size: 1.6em; letter-spacing: 0.4em;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
        }
        #overlay p {
            color: rgba(255,255,255,0.5); font-size: 0.75em; margin-top: 6px;
        }

        #controls {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            z-index: 10; display: flex; gap: 10px;
        }
        #controls button {
            background: rgba(0,0,0,0.45); color: #FFD700;
            border: 1px solid rgba(255,215,0,0.25); padding: 8px 18px;
            border-radius: 20px; font-family: inherit; font-size: 0.8em;
            cursor: pointer; -webkit-tap-highlight-color: transparent;
            backdrop-filter: blur(8px);
        }
        #controls button:active { background: rgba(255,215,0,0.15); }

        #info-panel {
            position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%);
            z-index: 10; background: rgba(0,0,0,0.6); color: #e0d5c0;
            padding: 12px 20px; border-radius: 12px; font-size: 0.8em;
            line-height: 1.8; text-align: center; max-width: 90vw;
            backdrop-filter: blur(8px); border: 1px solid rgba(255,215,0,0.15);
            display: none;
        }
        #info-panel.show { display: block; }
    </style>
</head>
<body>
    <div id="loading">
        <h2>永怀堂</h2>
        <div class="bar"><div class="bar-fill" id="load-bar"></div></div>
    </div>

    <div id="overlay">
        <h1>永怀堂</h1>
        <p>触摸旋转 · 双指缩放</p>
    </div>

    <div id="controls">
        <button onclick="resetCamera()">复位视角</button>
        <button onclick="toggleAutoRotate()">自动旋转</button>
        <button onclick="toggleInfo()">对联详情</button>
    </div>

    <div id="info-panel">
        <div style="color:#FFD700;margin-bottom:4px;">—— 殿堂对联 ——</div>
        <div>上联（右）：侃君厚德如山重</div>
        <div>下联（左）：广堡深恩似海长</div>
        <div style="color:#FFD700;margin-top:6px;">横批：祖德流芳</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
    (function() {
        'use strict';

        // ===== Scene Setup =====
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.FogExp2(0x9db8c7, 0.012);

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, 10, 22);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.1;
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.minDistance = 6;
        controls.maxDistance = 45;
        controls.maxPolarAngle = Math.PI / 2.05;
        controls.target.set(0, 3.5, 0);
        controls.update();

        // ===== Lighting =====
        const ambientLight = new THREE.AmbientLight(0xffeedd, 0.5);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xfff5e0, 1.0);
        sunLight.position.set(15, 25, 10);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.camera.near = 0.5;
        sunLight.shadow.camera.far = 60;
        sunLight.shadow.camera.left = -25;
        sunLight.shadow.camera.right = 25;
        sunLight.shadow.camera.top = 25;
        sunLight.shadow.camera.bottom = -25;
        sunLight.shadow.bias = -0.001;
        scene.add(sunLight);

        const fillLight = new THREE.DirectionalLight(0xaaccff, 0.3);
        fillLight.position.set(-10, 10, -5);
        scene.add(fillLight);

        // Warm light inside temple
        const interiorLight = new THREE.PointLight(0xff9944, 0.8, 12);
        interiorLight.position.set(0, 4, 0);
        scene.add(interiorLight);

        // ===== Materials =====
        const materials = {
            stone: new THREE.MeshStandardMaterial({ color: 0x8a8a7a, roughness: 0.9, metalness: 0.05 }),
            stoneDark: new THREE.MeshStandardMaterial({ color: 0x6b6b5e, roughness: 0.95 }),
            red: new THREE.MeshStandardMaterial({ color: 0x8B1A1A, roughness: 0.6, metalness: 0.1 }),
            redDark: new THREE.MeshStandardMaterial({ color: 0x6B0F0F, roughness: 0.7 }),
            wood: new THREE.MeshStandardMaterial({ color: 0x5C3317, roughness: 0.8 }),
            woodDark: new THREE.MeshStandardMaterial({ color: 0x3E1F0D, roughness: 0.85 }),
            gold: new THREE.MeshStandardMaterial({ color: 0xDAA520, roughness: 0.3, metalness: 0.6 }),
            roofTile: new THREE.MeshStandardMaterial({ color: 0x2C2C2C, roughness: 0.7, metalness: 0.1 }),
            roofEdge: new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.6 }),
            grass: new THREE.MeshStandardMaterial({ color: 0x4a7c3f, roughness: 0.95 }),
            path: new THREE.MeshStandardMaterial({ color: 0x9e9685, roughness: 0.9 }),
            bronze: new THREE.MeshStandardMaterial({ color: 0x8B7355, roughness: 0.4, metalness: 0.5 }),
            white: new THREE.MeshStandardMaterial({ color: 0xf5f0e8, roughness: 0.8 }),
            trunk: new THREE.MeshStandardMaterial({ color: 0x4a3728, roughness: 0.9 }),
            trunkDark: new THREE.MeshStandardMaterial({ color: 0x3a2a1a, roughness: 0.9 }),
            leafDark: new THREE.MeshStandardMaterial({ color: 0x2d5a1e, roughness: 0.85 }),
            leafMid: new THREE.MeshStandardMaterial({ color: 0x3d7a2e, roughness: 0.85 }),
            leafLight: new THREE.MeshStandardMaterial({ color: 0x5a9a3e, roughness: 0.85 }),
            leafLoquat: new THREE.MeshStandardMaterial({ color: 0x2a5520, roughness: 0.8 }),
            leafPomelo: new THREE.MeshStandardMaterial({ color: 0x3a6a2a, roughness: 0.8 }),
            bamboo: new THREE.MeshStandardMaterial({ color: 0x4a8a30, roughness: 0.7 }),
            bambooJoint: new THREE.MeshStandardMaterial({ color: 0x5a9a40, roughness: 0.6 }),
        };

        // ===== Helper: Text Texture =====
        function createTextTexture(text, options = {}) {
            const {
                fontSize = 64, fontFamily = 'KaiTi, STKaiti, PingFang SC, serif',
                color = '#000000', bgColor = '#FFFFFF',
                width = 256, height = 512, vertical = true,
                borderColor = null, borderWidth = 4, padding = 20
            } = options;

            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');

            // Background
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, width, height);

            // Border
            if (borderColor) {
                ctx.strokeStyle = borderColor;
                ctx.lineWidth = borderWidth;
                ctx.strokeRect(borderWidth/2, borderWidth/2, width - borderWidth, height - borderWidth);
                // Inner border
                ctx.lineWidth = 1;
                ctx.strokeRect(borderWidth + 4, borderWidth + 4, width - 2*(borderWidth+4), height - 2*(borderWidth+4));
            }

            // Text
            ctx.fillStyle = color;
            ctx.font = `bold ${fontSize}px ${fontFamily}`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            if (vertical) {
                const charHeight = fontSize * 1.3;
                const totalHeight = text.length * charHeight;
                const startY = (height - totalHeight) / 2 + charHeight / 2;
                for (let i = 0; i < text.length; i++) {
                    ctx.fillText(text[i], width / 2, startY + i * charHeight);
                }
            } else {
                ctx.fillText(text, width / 2, height / 2);
            }

            const texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;
            return texture;
        }

        // ===== Helper: Create Couplet =====
        function createCouplet(text, side) {
            const group = new THREE.Group();
            const w = 0.7, h = 3.2;

            // Board
            const boardGeo = new THREE.BoxGeometry(w, h, 0.08);
            const board = new THREE.Mesh(boardGeo, materials.redDark);
            board.position.y = h / 2 + 0.1;
            group.add(board);

            // Gold border frame
            const borderMat = materials.gold;
            // Top
            group.add(createBar(w + 0.08, 0.06, 0.1, 0, h + 0.1, 0, borderMat));
            // Bottom
            group.add(createBar(w + 0.08, 0.06, 0.1, 0, 0.1, 0, borderMat));
            // Left
            group.add(createBar(0.06, h + 0.08, 0.1, -w/2 - 0.01, h/2 + 0.1, 0, borderMat));
            // Right
            group.add(createBar(0.06, h + 0.08, 0.1, w/2 + 0.01, h/2 + 0.1, 0, borderMat));

            // Text texture
            const tex = createTextTexture(text, {
                fontSize: 72, color: '#FFD700', bgColor: '#6B0F0F',
                width: 200, height: 500, vertical: true,
                borderColor: '#B8860B', borderWidth: 6
            });
            const textMat = new THREE.MeshBasicMaterial({ map: tex, transparent: true });
            const textPlane = new THREE.Mesh(new THREE.PlaneGeometry(w * 0.85, h * 0.9), textMat);
            textPlane.position.set(0, h / 2 + 0.1, 0.05);
            group.add(textPlane);

            return group;
        }

        function createBar(w, h, d, x, y, z, mat) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
            mesh.position.set(x, y, z);
            return mesh;
        }

        // ===== Helper: Create Plaque =====
        function createPlaque(text) {
            const group = new THREE.Group();
            const w = 3.2, h = 0.9;

            const boardGeo = new THREE.BoxGeometry(w, h, 0.1);
            const board = new THREE.Mesh(boardGeo, materials.redDark);
            group.add(board);

            // Gold frame
            group.add(createBar(w + 0.1, 0.07, 0.12, 0, h/2 + 0.02, 0, materials.gold));
            group.add(createBar(w + 0.1, 0.07, 0.12, 0, -h/2 - 0.02, 0, materials.gold));
            group.add(createBar(0.07, h + 0.1, 0.12, -w/2 - 0.02, 0, 0, materials.gold));
            group.add(createBar(0.07, h + 0.1, 0.12, w/2 + 0.02, 0, 0, materials.gold));

            // Text
            const tex = createTextTexture(text, {
                fontSize: 80, color: '#FFD700', bgColor: '#6B0F0F',
                width: 400, height: 120, vertical: false,
                borderColor: '#B8860B', borderWidth: 4
            });
            const textMat = new THREE.MeshBasicMaterial({ map: tex, transparent: true });
            const textPlane = new THREE.Mesh(new THREE.PlaneGeometry(w * 0.85, h * 0.7), textMat);
            textPlane.position.z = 0.06;
            group.add(textPlane);

            return group;
        }

        // ===== Helper: Horizontal Scroll (横批) =====
        function createHorizontalScroll(text) {
            const group = new THREE.Group();
            const w = 2.6, h = 0.55;

            const board = new THREE.Mesh(new THREE.BoxGeometry(w, h, 0.06), materials.redDark);
            group.add(board);

            group.add(createBar(w + 0.06, 0.04, 0.08, 0, h/2 + 0.01, 0, materials.gold));
            group.add(createBar(w + 0.06, 0.04, 0.08, 0, -h/2 - 0.01, 0, materials.gold));

            const tex = createTextTexture(text, {
                fontSize: 52, color: '#FFD700', bgColor: '#6B0F0F',
                width: 360, height: 80, vertical: false
            });
            const textMat = new THREE.MeshBasicMaterial({ map: tex, transparent: true });
            const textPlane = new THREE.Mesh(new THREE.PlaneGeometry(w * 0.88, h * 0.7), textMat);
            textPlane.position.z = 0.04;
            group.add(textPlane);

            return group;
        }

        // ===== Helper: Chinese Roof =====
        function createChineseRoof(halfW, halfD, height, overhang, curvature) {
            const segs = 16;
            const vertices = [];
            const uvs = [];
            const indices = [];

            const w = halfW + overhang;
            const d = halfD + overhang;

            for (let iz = 0; iz <= segs; iz++) {
                for (let ix = 0; ix <= segs; ix++) {
                    const u = ix / segs;
                    const v = iz / segs;
                    const x = -w + u * 2 * w;
                    const z = -d + v * 2 * d;

                    const zDist = Math.abs(z) / d;
                    const xDist = Math.abs(x) / w;

                    // Hip roof profile
                    const maxZDist = Math.max(1 - xDist * 0.5, 0.01);
                    const normZ = Math.min(zDist / maxZDist, 1);
                    let y = height * (1 - normZ * normZ * 0.6 - normZ * 0.4);

                    // Eave upward curve at edges
                    const edgeDist = Math.sqrt(Math.pow(x / w, 2) + Math.pow(z / d, 2));
                    if (edgeDist > 0.75) {
                        const t = (edgeDist - 0.75) / 0.25;
                        y += curvature * t * t;
                    }

                    // Ridge slight upward curve at ends
                    if (zDist < 0.15) {
                        const ridgeT = zDist / 0.15;
                        y += 0.15 * Math.sin(ridgeT * Math.PI);
                    }

                    vertices.push(x, y, z);
                    uvs.push(u, v);
                }
            }

            for (let iz = 0; iz < segs; iz++) {
                for (let ix = 0; ix < segs; ix++) {
                    const a = iz * (segs + 1) + ix;
                    const b = a + 1;
                    const c = a + (segs + 1);
                    const dd = c + 1;
                    indices.push(a, c, b);
                    indices.push(b, c, dd);
                }
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
            geo.setIndex(indices);
            geo.computeVertexNormals();
            return geo;
        }

        // ===== Helper: Ridge Decoration =====
        function createRidgeEnd() {
            const group = new THREE.Group();
            // 鸱吻 style decoration
            const body = new THREE.Mesh(
                new THREE.ConeGeometry(0.2, 0.6, 6),
                materials.gold
            );
            body.rotation.z = Math.PI;
            group.add(body);

            const tail = new THREE.Mesh(
                new THREE.ConeGeometry(0.12, 0.4, 4),
                materials.gold
            );
            tail.position.set(0, 0.35, 0);
            tail.rotation.z = Math.PI * 0.7;
            group.add(tail);

            return group;
        }

        // ===== Helper: Trees =====
        function createLoquatTree(scale) {
            const group = new THREE.Group();
            const s = scale || 1;

            // Trunk - thick, slightly curved
            const trunk = new THREE.Mesh(
                new THREE.CylinderGeometry(0.12 * s, 0.2 * s, 2.5 * s, 8),
                materials.trunk
            );
            trunk.position.y = 1.25 * s;
            trunk.castShadow = true;
            group.add(trunk);

            // Canopy - broad, rounded, dense
            const canopyPositions = [
                [0, 3.2, 0, 1.8], [-0.8, 2.8, 0.5, 1.3], [0.7, 2.9, -0.4, 1.4],
                [0, 3.8, 0.3, 1.2], [-0.5, 3.5, -0.5, 1.1], [0.4, 2.6, 0.6, 1.0],
                [-0.3, 3.0, -0.2, 1.5], [0.6, 3.4, 0.2, 1.1]
            ];
            canopyPositions.forEach(([x, y, z, r]) => {
                const sphere = new THREE.Mesh(
                    new THREE.SphereGeometry(r * s, 8, 6),
                    materials.leafLoquat
                );
                sphere.position.set(x * s, y * s, z * s);
                sphere.castShadow = true;
                group.add(sphere);
            });

            return group;
        }

        function createPomeloTree(scale) {
            const group = new THREE.Group();
            const s = scale || 1;

            const trunk = new THREE.Mesh(
                new THREE.CylinderGeometry(0.1 * s, 0.18 * s, 2.8 * s, 8),
                materials.trunk
            );
            trunk.position.y = 1.4 * s;
            trunk.castShadow = true;
            group.add(trunk);

            // Canopy - rounder, lighter green
            const canopyPositions = [
                [0, 3.5, 0, 1.6], [-0.6, 3.2, 0.3, 1.2], [0.5, 3.3, -0.3, 1.3],
                [0, 4.0, 0, 1.1], [-0.4, 3.7, -0.4, 1.0], [0.3, 3.0, 0.5, 1.1]
            ];
            canopyPositions.forEach(([x, y, z, r]) => {
                const sphere = new THREE.Mesh(
                    new THREE.SphereGeometry(r * s, 8, 6),
                    materials.leafPomelo
                );
                sphere.position.set(x * s, y * s, z * s);
                sphere.castShadow = true;
                group.add(sphere);
            });

            return group;
        }

        function createPineTree(scale) {
            const group = new THREE.Group();
            const s = scale || 1;

            const trunk = new THREE.Mesh(
                new THREE.CylinderGeometry(0.08 * s, 0.15 * s, 3 * s, 8),
                materials.trunkDark
            );
            trunk.position.y = 1.5 * s;
            trunk.castShadow = true;
            group.add(trunk);

            // Layered cones
            const layers = [
                [0, 2.5, 0, 1.5, 1.2],
                [0, 3.3, 0, 1.2, 1.0],
                [0, 4.0, 0, 0.8, 0.9],
                [0, 4.5, 0, 0.5, 0.7]
            ];
            layers.forEach(([x, y, z, r, h]) => {
                const cone = new THREE.Mesh(
                    new THREE.ConeGeometry(r * s, h * s, 8),
                    materials.leafDark
                );
                cone.position.set(x * s, y * s, z * s);
                cone.castShadow = true;
                group.add(cone);
            });

            return group;
        }

        function createCypressTree(scale) {
            const group = new THREE.Group();
            const s = scale || 1;

            const trunk = new THREE.Mesh(
                new THREE.CylinderGeometry(0.06 * s, 0.12 * s, 3.5 * s, 8),
                materials.trunkDark
            );
            trunk.position.y = 1.75 * s;
            trunk.castShadow = true;
            group.add(trunk);

            // Tall, narrow, pointed shape
            const shapes = [
                [0, 3.0, 0, 0.8, 2.0],
                [0, 4.2, 0, 0.6, 1.5],
                [0, 5.0, 0, 0.35, 1.2],
                [0, 5.6, 0, 0.15, 0.8]
            ];
            shapes.forEach(([x, y, z, r, h]) => {
                const cone = new THREE.Mesh(
                    new THREE.ConeGeometry(r * s, h * s, 8),
                    materials.leafMid
                );
                cone.position.set(x * s, y * s, z * s);
                cone.castShadow = true;
                group.add(cone);
            });

            return group;
        }

        function createBambooCluster(scale) {
            const group = new THREE.Group();
            const s = scale || 1;
            const stalkCount = 5 + Math.floor(Math.random() * 4);

            for (let i = 0; i < stalkCount; i++) {
                const stalkGroup = new THREE.Group();
                const height = (3 + Math.random() * 2) * s;
                const radius = (0.03 + Math.random() * 0.02) * s;

                const stalk = new THREE.Mesh(
                    new THREE.CylinderGeometry(radius, radius * 1.1, height, 6),
                    materials.bamboo
                );
                stalk.position.y = height / 2;
                stalk.castShadow = true;
                stalkGroup.add(stalk);

                // Joints
                const jointCount = Math.floor(height / (0.5 * s));
                for (let j = 1; j < jointCount; j++) {
                    const joint = new THREE.Mesh(
                        new THREE.TorusGeometry(radius * 1.3, radius * 0.3, 4, 8),
                        materials.bambooJoint
                    );
                    joint.position.y = j * 0.5 * s;
                    joint.rotation.x = Math.PI / 2;
                    stalkGroup.add(joint);
                }

                // Leaves at top
                for (let l = 0; l < 3; l++) {
                    const leaf = new THREE.Mesh(
                        new THREE.PlaneGeometry(0.4 * s, 0.08 * s),
                        materials.leafLight
                    );
                    leaf.position.set(
                        (Math.random() - 0.5) * 0.3 * s,
                        height - Math.random() * 0.5 * s,
                        (Math.random() - 0.5) * 0.3 * s
                    );
                    leaf.rotation.set(
                        Math.random() * 0.5 - 0.25,
                        Math.random() * Math.PI,
                        Math.random() * 0.3
                    );
                    stalkGroup.add(leaf);
                }

                stalkGroup.position.set(
                    (Math.random() - 0.5) * 0.8 * s,
                    0,
                    (Math.random() - 0.5) * 0.8 * s
                );
                stalkGroup.rotation.x = (Math.random() - 0.5) * 0.05;
                stalkGroup.rotation.z = (Math.random() - 0.5) * 0.05;
                group.add(stalkGroup);
            }

            return group;
        }

        function createOsmanthusTree(scale) {
            const group = new THREE.Group();
            const s = scale || 1;

            const trunk = new THREE.Mesh(
                new THREE.CylinderGeometry(0.1 * s, 0.16 * s, 2.2 * s, 8),
                materials.trunk
            );
            trunk.position.y = 1.1 * s;
            trunk.castShadow = true;
            group.add(trunk);

            const canopyPositions = [
                [0, 2.8, 0, 1.4], [-0.7, 2.5, 0.4, 1.1], [0.6, 2.6, -0.3, 1.2],
                [0, 3.3, 0.2, 1.0], [-0.3, 3.0, -0.3, 1.2]
            ];
            canopyPositions.forEach(([x, y, z, r]) => {
                const sphere = new THREE.Mesh(
                    new THREE.SphereGeometry(r * s, 8, 6),
                    materials.leafMid
                );
                sphere.position.set(x * s, y * s, z * s);
                sphere.castShadow = true;
                group.add(sphere);
            });

            return group;
        }

        // ===== Helper: Stone Lantern =====
        function createStoneLantern(scale) {
            const group = new THREE.Group();
            const s = scale || 1;

            // Base
            group.add(createBar(0.5 * s, 0.15 * s, 0.5 * s, 0, 0.075 * s, 0, materials.stone));
            // Pillar
            const pillar = new THREE.Mesh(
                new THREE.CylinderGeometry(0.08 * s, 0.1 * s, 0.8 * s, 6),
                materials.stone
            );
            pillar.position.y = 0.55 * s;
            group.add(pillar);
            // Light chamber
            group.add(createBar(0.35 * s, 0.3 * s, 0.35 * s, 0, 1.1 * s, 0, materials.stone));
            // Roof
            const roof = new THREE.Mesh(
                new THREE.ConeGeometry(0.35 * s, 0.25 * s, 4),
                materials.stoneDark
            );
            roof.position.y = 1.4 * s;
            roof.rotation.y = Math.PI / 4;
            group.add(roof);
            // Top
            const top = new THREE.Mesh(
                new THREE.SphereGeometry(0.06 * s, 6, 4),
                materials.stone
            );
            top.position.y = 1.6 * s;
            group.add(top);

            // Warm glow
            const glow = new THREE.PointLight(0xffaa44, 0.3, 3);
            glow.position.y = 1.1 * s;
            group.add(glow);

            return group;
        }

        // ===== Helper: Incense Burner =====
        function createIncenseBurner() {
            const group = new THREE.Group();

            // Body
            const body = new THREE.Mesh(
                new THREE.CylinderGeometry(0.5, 0.35, 0.8, 12),
                materials.bronze
            );
            body.position.y = 0.4;
            body.castShadow = true;
            group.add(body);

            // Rim
            const rim = new THREE.Mesh(
                new THREE.TorusGeometry(0.5, 0.05, 8, 16),
                materials.bronze
            );
            rim.position.y = 0.8;
            rim.rotation.x = Math.PI / 2;
            group.add(rim);

            // Legs
            for (let i = 0; i < 3; i++) {
                const angle = (i / 3) * Math.PI * 2;
                const leg = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.04, 0.06, 0.3, 6),
                    materials.bronze
                );
                leg.position.set(Math.cos(angle) * 0.3, -0.15, Math.sin(angle) * 0.3);
                group.add(leg);
            }

            // Base plate
            const base = new THREE.Mesh(
                new THREE.CylinderGeometry(0.6, 0.65, 0.08, 12),
                materials.stone
            );
            base.position.y = -0.3;
            group.add(base);

            return group;
        }

        // ===== Helper: Smoke Particles =====
        function createSmoke() {
            const particleCount = 50;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const velocities = [];

            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 0.3;
                positions[i * 3 + 1] = Math.random() * 3;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 0.3;
                velocities.push({
                    x: (Math.random() - 0.5) * 0.003,
                    y: 0.005 + Math.random() * 0.008,
                    z: (Math.random() - 0.5) * 0.003
                });
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));

            const material = new THREE.PointsMaterial({
                color: 0xcccccc,
                size: 0.15,
                transparent: true,
                opacity: 0.3,
                depthWrite: false
            });

            const points = new THREE.Points(geometry, material);
            points.userData.velocities = velocities;
            return points;
        }

        // ===== Build Temple =====
        const temple = new THREE.Group();

        // --- Ground ---
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(80, 80),
            materials.grass
        );
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.05;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- Stone Path ---
        const pathGeo = new THREE.PlaneGeometry(2.5, 20);
        const path = new THREE.Mesh(pathGeo, materials.path);
        path.rotation.x = -Math.PI / 2;
        path.position.set(0, 0.01, 12);
        path.receiveShadow = true;
        scene.add(path);

        // Path border stones
        for (let i = -10; i < 10; i++) {
            const z = i * 1.2 + 2;
            [-1.4, 1.4].forEach(x => {
                const stone = new THREE.Mesh(
                    new THREE.BoxGeometry(0.3, 0.12, 0.5),
                    materials.stoneDark
                );
                stone.position.set(x, 0.06, z);
                stone.receiveShadow = true;
                scene.add(stone);
            });
        }

        // --- Platform (台基) ---
        const platformW = 14, platformD = 10, platformH = 1.2;
        const platform = new THREE.Mesh(
            new THREE.BoxGeometry(platformW, platformH, platformD),
            materials.stone
        );
        platform.position.set(0, platformH / 2, 0);
        platform.castShadow = true;
        platform.receiveShadow = true;
        temple.add(platform);

        // Platform top edge
        const topEdge = new THREE.Mesh(
            new THREE.BoxGeometry(platformW + 0.3, 0.1, platformD + 0.3),
            materials.stoneDark
        );
        topEdge.position.set(0, platformH + 0.05, 0);
        temple.add(topEdge);

        // --- Steps ---
        const stepW = 3, stepD = 0.5, stepH = 0.3;
        for (let i = 0; i < 4; i++) {
            const step = new THREE.Mesh(
                new THREE.BoxGeometry(stepW, stepH, stepD),
                materials.stone
            );
            step.position.set(0, platformH - i * stepH + stepH / 2, platformD / 2 + 0.25 + i * stepD);
            step.castShadow = true;
            step.receiveShadow = true;
            temple.add(step);
        }

        // Step railings
        [-stepW / 2 - 0.15, stepW / 2 + 0.15].forEach(x => {
            const rail = new THREE.Mesh(
                new THREE.BoxGeometry(0.12, 0.6, platformD * 0.15 + 4 * stepD),
                materials.stone
            );
            rail.position.set(x, platformH + 0.3, platformD / 2 + platformD * 0.075 + 2 * stepD);
            temple.add(rail);

            // Railing post top
            const post = new THREE.Mesh(
                new THREE.SphereGeometry(0.1, 6, 4),
                materials.stoneDark
            );
            post.position.set(x, platformH + 0.65, platformD / 2 + platformD * 0.15 + 4 * stepD);
            temple.add(post);
        });

        // --- Pillars ---
        const pillarH = 5;
        const pillarR = 0.22;
        const pillarPositions = [
            [-4.5, 0, -3.5], [4.5, 0, -3.5],
            [-4.5, 0, 3.5], [4.5, 0, 3.5],
            [-1.5, 0, -3.5], [1.5, 0, -3.5],
            [-1.5, 0, 3.5], [1.5, 0, 3.5]
        ];

        pillarPositions.forEach(([x, y, z]) => {
            const pillar = new THREE.Mesh(
                new THREE.CylinderGeometry(pillarR, pillarR * 1.1, pillarH, 12),
                materials.red
            );
            pillar.position.set(x, platformH + pillarH / 2, z);
            pillar.castShadow = true;
            temple.add(pillar);

            // Pillar base
            const base = new THREE.Mesh(
                new THREE.CylinderGeometry(pillarR * 1.4, pillarR * 1.5, 0.2, 12),
                materials.stone
            );
            base.position.set(x, platformH + 0.1, z);
            temple.add(base);

            // Pillar top cap
            const cap = new THREE.Mesh(
                new THREE.CylinderGeometry(pillarR * 1.3, pillarR * 1.1, 0.15, 12),
                materials.gold
            );
            cap.position.set(x, platformH + pillarH, z);
            temple.add(cap);
        });

        // --- Walls ---
        // Back wall
        const backWall = new THREE.Mesh(
            new THREE.BoxGeometry(10, pillarH - 0.5, 0.25),
            materials.white
        );
        backWall.position.set(0, platformH + (pillarH - 0.5) / 2, -3.5);
        backWall.castShadow = true;
        temple.add(backWall);

        // Side walls
        [-1, 1].forEach(side => {
            const sideWall = new THREE.Mesh(
                new THREE.BoxGeometry(0.25, pillarH - 0.5, 7),
                materials.white
            );
            sideWall.position.set(side * 5.5, platformH + (pillarH - 0.5) / 2, 0);
            sideWall.castShadow = true;
            temple.add(sideWall);
        });

        // --- Ceiling beam ---
        const beam = new THREE.Mesh(
            new THREE.BoxGeometry(10, 0.2, 7),
            materials.redDark
        );
        beam.position.set(0, platformH + pillarH - 0.3, 0);
        temple.add(beam);

        // --- Door ---
        const doorW = 2.2, doorH = 3.5;
        // Door frame
        const doorFrame = new THREE.Mesh(
            new THREE.BoxGeometry(doorW + 0.3, doorH + 0.3, 0.15),
            materials.redDark
        );
        doorFrame.position.set(0, platformH + doorH / 2, 3.55);
        temple.add(doorFrame);

        // Door panels
        [-0.55, 0.55].forEach(x => {
            const panel = new THREE.Mesh(
                new THREE.BoxGeometry(doorW / 2 - 0.1, doorH, 0.08),
                materials.woodDark
            );
            panel.position.set(x, platformH + doorH / 2, 3.6);
            temple.add(panel);

            // Door ring (门环)
            const ring = new THREE.Mesh(
                new THREE.TorusGeometry(0.1, 0.02, 6, 12),
                materials.gold
            );
            ring.position.set(x + (x > 0 ? -0.3 : 0.3), platformH + doorH * 0.45, 3.66);
            temple.add(ring);

            // Door ring base
            const ringBase = new THREE.Mesh(
                new THREE.CylinderGeometry(0.08, 0.08, 0.04, 8),
                materials.gold
            );
            ringBase.position.set(x + (x > 0 ? -0.3 : 0.3), platformH + doorH * 0.45, 3.65);
            ringBase.rotation.x = Math.PI / 2;
            temple.add(ringBase);
        });

        // Door threshold
        const threshold = new THREE.Mesh(
            new THREE.BoxGeometry(doorW + 0.3, 0.15, 0.4),
            materials.stone
        );
        threshold.position.set(0, platformH + 0.075, 3.7);
        temple.add(threshold);

        // --- Couplets ---
        const rightCouplet = createCouplet('侃君厚德如山重', 'right');
        rightCouplet.position.set(-2.8, platformH, 3.55);
        temple.add(rightCouplet);

        const leftCouplet = createCouplet('广堡深恩似海长', 'left');
        leftCouplet.position.set(2.8, platformH, 3.55);
        temple.add(leftCouplet);

        // --- Plaque (匾额) ---
        const plaque = createPlaque('永怀堂');
        plaque.position.set(0, platformH + pillarH - 0.2, 3.55);
        temple.add(plaque);

        // --- Horizontal Scroll (横批) ---
        const scroll = createHorizontalScroll('祖德流芳');
        scroll.position.set(0, platformH + doorH + 0.6, 3.55);
        temple.add(scroll);

        // --- Roof ---
        const roofGeo = createChineseRoof(6, 4.5, 2.5, 1.8, 0.6);
        const roof = new THREE.Mesh(roofGeo, materials.roofTile);
        roof.position.set(0, platformH + pillarH + 0.1, 0);
        roof.castShadow = true;
        roof.material.side = THREE.DoubleSide;
        temple.add(roof);

        // Roof underside (ceiling)
        const ceilingGeo = new THREE.PlaneGeometry(12, 9);
        const ceiling = new THREE.Mesh(ceilingGeo, materials.redDark);
        ceiling.rotation.x = Math.PI / 2;
        ceiling.position.set(0, platformH + pillarH + 0.05, 0);
        temple.add(ceiling);

        // Ridge
        const ridge = new THREE.Mesh(
            new THREE.CylinderGeometry(0.12, 0.12, 10, 8),
            materials.gold
        );
        ridge.rotation.x = Math.PI / 2;
        ridge.position.set(0, platformH + pillarH + 2.6, 0);
        temple.add(ridge);

        // Ridge end decorations
        const ridgeEnd1 = createRidgeEnd();
        ridgeEnd1.position.set(0, platformH + pillarH + 2.6, -5.2);
        ridgeEnd1.rotation.x = Math.PI / 2;
        temple.add(ridgeEnd1);

        const ridgeEnd2 = createRidgeEnd();
        ridgeEnd2.position.set(0, platformH + pillarH + 2.6, 5.2);
        ridgeEnd2.rotation.x = -Math.PI / 2;
        temple.add(ridgeEnd2);

        // Eave edge trim
        const eaveTrimGeo = new THREE.BoxGeometry(14, 0.08, 0.08);
        const eaveTrimFront = new THREE.Mesh(eaveTrimGeo, materials.roofEdge);
        eaveTrimFront.position.set(0, platformH + pillarH + 0.15, 6.3);
        temple.add(eaveTrimFront);
        const eaveTrimBack = new THREE.Mesh(eaveTrimGeo, materials.roofEdge);
        eaveTrimBack.position.set(0, platformH + pillarH + 0.15, -6.3);
        temple.add(eaveTrimBack);

        const eaveTrimSideGeo = new THREE.BoxGeometry(0.08, 0.08, 10.6);
        [-6.5, 6.5].forEach(x => {
            const trim = new THREE.Mesh(eaveTrimSideGeo, materials.roofEdge);
            trim.position.set(x, platformH + pillarH + 0.15, 0);
            temple.add(trim);
        });

        // --- Interior Altar ---
        // Altar table
        const altarTable = new THREE.Mesh(
            new THREE.BoxGeometry(2.5, 0.8, 0.8),
            materials.wood
        );
        altarTable.position.set(0, platformH + 0.4, -2);
        temple.add(altarTable);

        // Altar table legs
        [[-1, -0.3], [1, -0.3], [-1, 0.3], [1, 0.3]].forEach(([x, z]) => {
            const leg = new THREE.Mesh(
                new THREE.BoxGeometry(0.1, 0.8, 0.1),
                materials.woodDark
            );
            leg.position.set(x, platformH + 0.4, -2 + z);
            temple.add(leg);
        });

        // Spirit tablet (牌位)
        const tablet = new THREE.Mesh(
            new THREE.BoxGeometry(0.5, 0.8, 0.08),
            materials.woodDark
        );
        tablet.position.set(0, platformH + 1.2, -2);
        temple.add(tablet);

        // Tablet text
        const tabletTex = createTextTexture('先考', {
            fontSize: 60, color: '#FFD700', bgColor: '#3E1F0D',
            width: 100, height: 160, vertical: true
        });
        const tabletTextMat = new THREE.MeshBasicMaterial({ map: tabletTex, transparent: true });
        const tabletText = new THREE.Mesh(new THREE.PlaneGeometry(0.4, 0.65), tabletTextMat);
        tabletText.position.set(0, platformH + 1.2, -1.95);
        temple.add(tabletText);

        // Candle holders
        [-0.8, 0.8].forEach(x => {
            const holder = new THREE.Mesh(
                new THREE.CylinderGeometry(0.06, 0.08, 0.3, 8),
                materials.bronze
            );
            holder.position.set(x, platformH + 0.95, -2);
            temple.add(holder);

            // Candle
            const candle = new THREE.Mesh(
                new THREE.CylinderGeometry(0.03, 0.03, 0.25, 6),
                new THREE.MeshStandardMaterial({ color: 0xfff8dc, emissive: 0xff6600, emissiveIntensity: 0.3 })
            );
            candle.position.set(x, platformH + 1.2, -2);
            temple.add(candle);

            // Flame light
            const flameLight = new THREE.PointLight(0xff8833, 0.4, 3);
            flameLight.position.set(x, platformH + 1.4, -2);
            temple.add(flameLight);
        });

        // Incense pot on altar
        const altarIncense = new THREE.Mesh(
            new THREE.CylinderGeometry(0.12, 0.1, 0.2, 8),
            materials.bronze
        );
        altarIncense.position.set(0, platformH + 0.9, -2);
        temple.add(altarIncense);

        scene.add(temple);

        // ===== Environment =====

        // --- Incense Burner (in front of temple) ---
        const incenseBurner = createIncenseBurner();
        incenseBurner.position.set(0, 0, 8);
        scene.add(incenseBurner);

        // Smoke
        const smoke = createSmoke();
        smoke.position.set(0, 0.8, 8);
        scene.add(smoke);

        // --- Stone Lanterns ---
        const lanternPositions = [
            [-3, 0, 6], [3, 0, 6],
            [-3, 0, 10], [3, 0, 10],
            [-3, 0, 14], [3, 0, 14]
        ];
        lanternPositions.forEach(([x, y, z]) => {
            const lantern = createStoneLantern(0.9);
            lantern.position.set(x, y, z);
            scene.add(lantern);
        });

        // --- Trees ---
        // 枇杷树 (Loquat trees)
        const loquatPositions = [
            [-9, 0, -2], [10, 0, 1], [-8, 0, 5]
        ];
        loquatPositions.forEach(([x, y, z]) => {
            const tree = createLoquatTree(1.1);
            tree.position.set(x, y, z);
            tree.rotation.y = Math.random() * Math.PI * 2;
            scene.add(tree);
        });

        // 柚子树 (Pomelo trees)
        const pomeloPositions = [
            [9, 0, -3], [-10, 0, -6], [8, 0, 6]
        ];
        pomeloPositions.forEach(([x, y, z]) => {
            const tree = createPomeloTree(1.0);
            tree.position.set(x, y, z);
            tree.rotation.y = Math.random() * Math.PI * 2;
            scene.add(tree);
        });

        // 松树 (Pine trees)
        const pinePositions = [
            [-7, 0, -8], [7, 0, -7], [-11, 0, 2]
        ];
        pinePositions.forEach(([x, y, z]) => {
            const tree = createPineTree(1.0);
            tree.position.set(x, y, z);
            tree.rotation.y = Math.random() * Math.PI * 2;
            scene.add(tree);
        });

        // 柏树 (Cypress trees)
        const cypressPositions = [
            [-6, 0, 8], [6, 0, 8], [-5, 0, -5], [5, 0, -5]
        ];
        cypressPositions.forEach(([x, y, z]) => {
            const tree = createCypressTree(0.9);
            tree.position.set(x, y, z);
            tree.rotation.y = Math.random() * Math.PI * 2;
            scene.add(tree);
        });

        // 竹子 (Bamboo clusters)
        const bambooPositions = [
            [-11, 0, -4, 1.2], [11, 0, -1, 1.0], [-9, 0, 8, 0.9]
        ];
        bambooPositions.forEach(([x, y, z, s]) => {
            const bamboo = createBambooCluster(s);
            bamboo.position.set(x, y, z);
            scene.add(bamboo);
        });

        // 桂花树 (Osmanthus)
        const osmanthusPositions = [
            [11, 0, 4], [-10, 0, -1]
        ];
        osmanthusPositions.forEach(([x, y, z]) => {
            const tree = createOsmanthusTree(1.0);
            tree.position.set(x, y, z);
            tree.rotation.y = Math.random() * Math.PI * 2;
            scene.add(tree);
        });

        // --- Decorative stones ---
        for (let i = 0; i < 15; i++) {
            const angle = Math.random() * Math.PI * 2;
            const dist = 8 + Math.random() * 12;
            const stone = new THREE.Mesh(
                new THREE.SphereGeometry(0.2 + Math.random() * 0.3, 5, 4),
                materials.stoneDark
            );
            stone.position.set(
                Math.cos(angle) * dist,
                0.1,
                Math.sin(angle) * dist
            );
            stone.scale.y = 0.5 + Math.random() * 0.3;
            scene.add(stone);
        }

        // --- Sky gradient (using a large sphere) ---
        const skyGeo = new THREE.SphereGeometry(80, 32, 16);
        const skyMat = new THREE.ShaderMaterial({
            uniforms: {
                topColor: { value: new THREE.Color(0x4a90c2) },
                bottomColor: { value: new THREE.Color(0xc8d8e8) },
                offset: { value: 10 },
                exponent: { value: 0.5 }
            },
            vertexShader: `
                varying vec3 vWorldPosition;
                void main() {
                    vec4 worldPosition = modelMatrix * vec4(position, 1.0);
                    vWorldPosition = worldPosition.xyz;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform vec3 topColor;
                uniform vec3 bottomColor;
                uniform float offset;
                uniform float exponent;
                varying vec3 vWorldPosition;
                void main() {
                    float h = normalize(vWorldPosition + offset).y;
                    gl_FragColor = vec4(mix(bottomColor, topColor, max(pow(max(h, 0.0), exponent), 0.0)), 1.0);
                }
            `,
            side: THREE.BackSide
        });
        const sky = new THREE.Mesh(skyGeo, skyMat);
        scene.add(sky);

        // ===== Animation =====
        let autoRotate = false;
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const elapsed = clock.getElapsedTime();

            controls.autoRotate = autoRotate;
            controls.autoRotateSpeed = 1.5;
            controls.update();

            // Animate smoke
            const smokePositions = smoke.geometry.attributes.position;
            const velocities = smoke.userData.velocities;
            for (let i = 0; i < velocities.length; i++) {
                let y = smokePositions.getY(i);
                y += velocities[i].y;
                if (y > 3) {
                    y = 0;
                    smokePositions.setX(i, (Math.random() - 0.5) * 0.3);
                    smokePositions.setZ(i, (Math.random() - 0.5) * 0.3);
                }
                smokePositions.setX(i, smokePositions.getX(i) + velocities[i].x + Math.sin(elapsed + i) * 0.001);
                smokePositions.setY(i, y);
                smokePositions.setZ(i, smokePositions.getZ(i) + velocities[i].z + Math.cos(elapsed + i) * 0.001);
            }
            smokePositions.needsUpdate = true;

            // Subtle candle flicker
            interiorLight.intensity = 0.8 + Math.sin(elapsed * 5) * 0.1 + Math.sin(elapsed * 7.3) * 0.05;

            renderer.render(scene, camera);
        }

        // ===== Loading =====
        const loadBar = document.getElementById('load-bar');
        let loadProgress = 0;
        const loadInterval = setInterval(() => {
            loadProgress += Math.random() * 15 + 5;
            if (loadProgress >= 100) {
                loadProgress = 100;
                loadBar.style.width = '100%';
                clearInterval(loadInterval);
                setTimeout(() => {
                    document.getElementById('loading').classList.add('hidden');
                }, 400);
            } else {
                loadBar.style.width = loadProgress + '%';
            }
        }, 100);

        animate();

        // ===== Event Handlers =====
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Global functions for buttons
        window.resetCamera = function() {
            controls.target.set(0, 3.5, 0);
            camera.position.set(0, 10, 22);
            controls.update();
        };

        window.toggleAutoRotate = function() {
            autoRotate = !autoRotate;
        };

        window.toggleInfo = function() {
            const panel = document.getElementById('info-panel');
            panel.classList.toggle('show');
        };

    })();
    </script>
</body>
</html>
