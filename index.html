<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>永怀堂 - 纪念寺庙</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #1a1a2e; font-family: 'KaiTi', 'STKaiti', 'PingFang SC', serif; }
        canvas { display: block; touch-action: none; }
        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; transition: opacity 1s ease;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        #loading h2 { color: #FFD700; font-size: 2em; letter-spacing: 0.6em; margin-bottom: 8px; }
        #loading p { color: rgba(255,215,0,0.5); font-size: 0.85em; letter-spacing: 0.3em; margin-bottom: 24px; }
        #loading .bar { width: 180px; height: 2px; background: rgba(255,215,0,0.15); border-radius: 1px; overflow: hidden; }
        #loading .bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #FFD700, #FFA500); transition: width 0.3s; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%;
            pointer-events: none; z-index: 10; text-align: center; padding: 18px;
        }
        #overlay h1 {
            color: #FFD700; font-size: 1.5em; letter-spacing: 0.5em;
            text-shadow: 0 2px 12px rgba(0,0,0,0.7), 0 0 30px rgba(255,215,0,0.15);
        }
        #overlay p { color: rgba(255,255,255,0.4); font-size: 0.7em; margin-top: 5px; letter-spacing: 0.2em; }
        #controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 10; display: flex; gap: 8px;
        }
        #controls button {
            background: rgba(0,0,0,0.5); color: #e8d5a0;
            border: 1px solid rgba(255,215,0,0.2); padding: 7px 16px;
            border-radius: 20px; font-family: inherit; font-size: 0.75em;
            cursor: pointer; -webkit-tap-highlight-color: transparent;
            backdrop-filter: blur(10px); transition: all 0.2s;
        }
        #controls button:active { background: rgba(255,215,0,0.12); transform: scale(0.96); }
        #info-panel {
            position: fixed; bottom: 64px; left: 50%; transform: translateX(-50%);
            z-index: 10; background: rgba(10,8,5,0.75); color: #e0d5c0;
            padding: 14px 22px; border-radius: 14px; font-size: 0.78em;
            line-height: 2; text-align: center; max-width: 88vw;
            backdrop-filter: blur(12px); border: 1px solid rgba(255,215,0,0.12);
            display: none;
        }
        #info-panel.show { display: block; }
        #info-panel .label { color: #c9a84c; font-size: 0.9em; }
    </style>
</head>
<body>
    <div id="loading">
        <h2>永怀堂</h2>
        <p>纪念先父</p>
        <div class="bar"><div class="bar-fill" id="load-bar"></div></div>
    </div>
    <div id="overlay">
        <h1>永怀堂</h1>
        <p>双指缩放 · 单指旋转</p>
    </div>
    <div id="controls">
        <button onclick="resetCamera()">复位</button>
        <button onclick="toggleAutoRotate()">旋转</button>
        <button onclick="toggleInfo()">对联</button>
    </div>
    <div id="info-panel">
        <div class="label">—— 殿堂对联 ——</div>
        <div>上联（右）：广堡深恩似海长</div>
        <div>下联（左）：侃君厚德如山重</div>
        <div class="label" style="margin-top:4px;">横批：祖德流芳</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
    (function(){
        'use strict';

        /* ═══════════════════════════════════════
           SCENE, CAMERA, RENDERER
        ═══════════════════════════════════════ */
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x8fb8d0);
        scene.fog = new THREE.FogExp2(0x9db8c7, 0.008);

        const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 300);
        camera.position.set(0, 9, 24);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference:'high-performance' });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.15;
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.07;
        controls.minDistance = 5;
        controls.maxDistance = 50;
        controls.maxPolarAngle = Math.PI / 2.02;
        controls.target.set(0, 3.8, 0);
        controls.update();

        /* ═══════════════════════════════════════
           LIGHTING
        ═══════════════════════════════════════ */
        scene.add(new THREE.AmbientLight(0xffeedd, 0.45));

        const sun = new THREE.DirectionalLight(0xfff5e0, 1.1);
        sun.position.set(12, 22, 8);
        sun.castShadow = true;
        sun.shadow.mapSize.set(4096, 4096);
        sun.shadow.camera.near = 0.5;
        sun.shadow.camera.far = 60;
        const sc = 28;
        sun.shadow.camera.left = -sc;
        sun.shadow.camera.right = sc;
        sun.shadow.camera.top = sc;
        sun.shadow.camera.bottom = -sc;
        sun.shadow.bias = -0.0005;
        sun.shadow.normalBias = 0.02;
        scene.add(sun);

        scene.add(new THREE.DirectionalLight(0xaaccff, 0.25).translateX(-8).translateY(8));

        const interiorGlow = new THREE.PointLight(0xff9944, 0.6, 14);
        interiorGlow.position.set(0, 4.5, -1);
        scene.add(interiorGlow);

        /* ═══════════════════════════════════════
           PROCEDURAL TEXTURES
        ═══════════════════════════════════════ */
        function makeCanvasTex(w, h, drawFn) {
            const c = document.createElement('canvas');
            c.width = w; c.height = h;
            const ctx = c.getContext('2d');
            drawFn(ctx, w, h);
            const t = new THREE.CanvasTexture(c);
            t.wrapS = t.wrapT = THREE.RepeatWrapping;
            return t;
        }

        // Stone texture with grain
        const stoneTex = makeCanvasTex(512, 512, (ctx, w, h) => {
            ctx.fillStyle = '#8a8a7a';
            ctx.fillRect(0, 0, w, h);
            for (let i = 0; i < 8000; i++) {
                const x = Math.random() * w, y = Math.random() * h;
                const v = 120 + Math.random() * 40;
                ctx.fillStyle = `rgba(${v},${v},${v-10},0.15)`;
                ctx.fillRect(x, y, 1 + Math.random() * 2, 1 + Math.random() * 2);
            }
            // Subtle cracks
            ctx.strokeStyle = 'rgba(60,60,50,0.08)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i < 8; i++) {
                ctx.beginPath();
                let cx = Math.random() * w, cy = Math.random() * h;
                ctx.moveTo(cx, cy);
                for (let j = 0; j < 5; j++) {
                    cx += (Math.random() - 0.5) * 60;
                    cy += Math.random() * 40;
                    ctx.lineTo(cx, cy);
                }
                ctx.stroke();
            }
        });

        // Roof tile texture
        const roofTex = makeCanvasTex(512, 512, (ctx, w, h) => {
            ctx.fillStyle = '#2a2a2a';
            ctx.fillRect(0, 0, w, h);
            const tileH = 32;
            for (let row = 0; row < h / tileH; row++) {
                const offset = (row % 2) * 20;
                for (let col = -1; col < w / 40 + 1; col++) {
                    const x = col * 40 + offset;
                    const y = row * tileH;
                    const shade = 30 + Math.random() * 20;
                    ctx.fillStyle = `rgb(${shade},${shade},${shade})`;
                    ctx.beginPath();
                    ctx.arc(x + 20, y + tileH / 2, 18, 0, Math.PI, false);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                }
            }
        });
        roofTex.repeat.set(3, 3);

        // Wood grain texture
        const woodTex = makeCanvasTex(256, 256, (ctx, w, h) => {
            ctx.fillStyle = '#5C3317';
            ctx.fillRect(0, 0, w, h);
            for (let i = 0; i < 60; i++) {
                const y = Math.random() * h;
                ctx.strokeStyle = `rgba(${40+Math.random()*30},${20+Math.random()*20},${5+Math.random()*15},${0.1+Math.random()*0.15})`;
                ctx.lineWidth = 0.5 + Math.random() * 1.5;
                ctx.beginPath();
                ctx.moveTo(0, y);
                for (let x = 0; x < w; x += 10) {
                    ctx.lineTo(x, y + Math.sin(x * 0.02) * 3 + (Math.random() - 0.5) * 2);
                }
                ctx.stroke();
            }
        });

        // Grass texture
        const grassTex = makeCanvasTex(512, 512, (ctx, w, h) => {
            ctx.fillStyle = '#4a7c3f';
            ctx.fillRect(0, 0, w, h);
            for (let i = 0; i < 15000; i++) {
                const x = Math.random() * w, y = Math.random() * h;
                const g = 80 + Math.random() * 80;
                ctx.strokeStyle = `rgba(${30+Math.random()*40},${g},${20+Math.random()*30},0.4)`;
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(x + (Math.random()-0.5)*4, y - 2 - Math.random()*5);
                ctx.stroke();
            }
        });
        grassTex.repeat.set(8, 8);

        // Path stone texture
        const pathTex = makeCanvasTex(256, 256, (ctx, w, h) => {
            ctx.fillStyle = '#9e9685';
            ctx.fillRect(0, 0, w, h);
            const size = 40;
            for (let row = 0; row < h/size; row++) {
                for (let col = 0; col < w/size; col++) {
                    const v = 140 + Math.random() * 30;
                    ctx.fillStyle = `rgb(${v},${v-5},${v-15})`;
                    ctx.fillRect(col*size+1, row*size+1, size-2, size-2);
                }
            }
        });
        pathTex.repeat.set(2, 6);

        // Red pillar texture
        const pillarTex = makeCanvasTex(128, 512, (ctx, w, h) => {
            const grad = ctx.createLinearGradient(0, 0, w, 0);
            grad.addColorStop(0, '#6B0F0F');
            grad.addColorStop(0.2, '#9B2020');
            grad.addColorStop(0.5, '#A82828');
            grad.addColorStop(0.8, '#9B2020');
            grad.addColorStop(1, '#6B0F0F');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);
            for (let i = 0; i < 2000; i++) {
                ctx.fillStyle = `rgba(${Math.random()>0.5?180:60},${Math.random()*30},${Math.random()*30},0.03)`;
                ctx.fillRect(Math.random()*w, Math.random()*h, 1, 1+Math.random()*3);
            }
        });

        /* ═══════════════════════════════════════
           MATERIALS
        ═══════════════════════════════════════ */
        const M = {
            stone: new THREE.MeshStandardMaterial({ map: stoneTex, roughness: 0.92, metalness: 0.02 }),
            stoneDark: new THREE.MeshStandardMaterial({ color: 0x6b6b5e, roughness: 0.95 }),
            stoneLight: new THREE.MeshStandardMaterial({ color: 0xa09a8a, roughness: 0.9 }),
            red: new THREE.MeshStandardMaterial({ map: pillarTex, roughness: 0.55, metalness: 0.08 }),
            redDark: new THREE.MeshStandardMaterial({ color: 0x5a0e0e, roughness: 0.65 }),
            wood: new THREE.MeshStandardMaterial({ map: woodTex, roughness: 0.75, metalness: 0.02 }),
            woodDark: new THREE.MeshStandardMaterial({ color: 0x3a1a08, roughness: 0.8 }),
            gold: new THREE.MeshStandardMaterial({ color: 0xDAA520, roughness: 0.25, metalness: 0.7 }),
            goldBright: new THREE.MeshStandardMaterial({ color: 0xFFD700, roughness: 0.2, metalness: 0.8 }),
            roof: new THREE.MeshStandardMaterial({ map: roofTex, roughness: 0.75, metalness: 0.05 }),
            roofEdge: new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.6 }),
            grass: new THREE.MeshStandardMaterial({ map: grassTex, roughness: 0.95 }),
            path: new THREE.MeshStandardMaterial({ map: pathTex, roughness: 0.88 }),
            bronze: new THREE.MeshStandardMaterial({ color: 0x6B5B3A, roughness: 0.35, metalness: 0.6 }),
            white: new THREE.MeshStandardMaterial({ color: 0xf0ebe0, roughness: 0.85 }),
            trunk: new THREE.MeshStandardMaterial({ color: 0x4a3728, roughness: 0.92 }),
            trunkDark: new THREE.MeshStandardMaterial({ color: 0x3a2a1a, roughness: 0.92 }),
            leafDark: new THREE.MeshStandardMaterial({ color: 0x2d5a1e, roughness: 0.88 }),
            leafMid: new THREE.MeshStandardMaterial({ color: 0x3d7a2e, roughness: 0.88 }),
            leafLight: new THREE.MeshStandardMaterial({ color: 0x5a9a3e, roughness: 0.88 }),
            leafLoquat: new THREE.MeshStandardMaterial({ color: 0x2a5520, roughness: 0.85 }),
            leafPomelo: new THREE.MeshStandardMaterial({ color: 0x3a6a2a, roughness: 0.85 }),
            bamboo: new THREE.MeshStandardMaterial({ color: 0x4a8a30, roughness: 0.65 }),
            bambooJoint: new THREE.MeshStandardMaterial({ color: 0x5a9a40, roughness: 0.55 }),
            candle: new THREE.MeshStandardMaterial({ color: 0xfff8dc, emissive: 0xff6600, emissiveIntensity: 0.4 }),
            flame: new THREE.MeshBasicMaterial({ color: 0xff8833 }),
        };

        /* ═══════════════════════════════════════
           HELPERS
        ═══════════════════════════════════════ */
        function box(w,h,d,mat){ return new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat); }
        function cyl(rt,rb,h,seg,mat){ return new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,seg), mat); }
        function sph(r,seg,mat){ return new THREE.Mesh(new THREE.SphereGeometry(r,seg,seg), mat); }
        function cone(r,h,seg,mat){ return new THREE.Mesh(new THREE.ConeGeometry(r,h,seg), mat); }
        function torus(R,r,seg,mat){ return new THREE.Mesh(new THREE.TorusGeometry(R,r,seg,seg*2), mat); }

        function pos(mesh, x, y, z){ mesh.position.set(x,y,z); return mesh; }
        function rot(mesh, x, y, z){ mesh.rotation.set(x,y,z); return mesh; }

        function addShadow(m){ m.castShadow=true; m.receiveShadow=true; return m; }

        /* ═══════════════════════════════════════
           TEXT TEXTURES FOR COUPLETS
        ═══════════════════════════════════════ */
        function createTextTexture(text, opts={}){
            const {
                fontSize=64, color='#000', bgColor='#FFF',
                width=256, height=512, vertical=true,
                borderColor=null, borderWidth=4
            } = opts;
            const c = document.createElement('canvas');
            c.width = width; c.height = height;
            const ctx = c.getContext('2d');

            // Wood-grain background
            ctx.fillStyle = bgColor;
            ctx.fillRect(0,0,width,height);
            for(let i=0;i<300;i++){
                ctx.strokeStyle = `rgba(${60+Math.random()*40},${20+Math.random()*20},${5+Math.random()*10},0.06)`;
                ctx.lineWidth = 0.5+Math.random();
                ctx.beginPath();
                const y0 = Math.random()*height;
                ctx.moveTo(0,y0);
                for(let x=0;x<width;x+=8) ctx.lineTo(x, y0+Math.sin(x*0.03)*2);
                ctx.stroke();
            }

            if(borderColor){
                ctx.strokeStyle = borderColor;
                ctx.lineWidth = borderWidth;
                ctx.strokeRect(borderWidth/2,borderWidth/2,width-borderWidth,height-borderWidth);
                ctx.lineWidth = 1;
                ctx.strokeRect(borderWidth+5,borderWidth+5,width-2*(borderWidth+5),height-2*(borderWidth+5));
            }

            ctx.fillStyle = color;
            ctx.font = `bold ${fontSize}px KaiTi, STKaiti, "PingFang SC", "Noto Serif SC", serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            if(vertical){
                const ch = fontSize*1.35;
                const sy = (height - text.length*ch)/2 + ch/2;
                for(let i=0;i<text.length;i++){
                    // Subtle shadow
                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                    ctx.fillText(text[i], width/2+2, sy+i*ch+2);
                    ctx.fillStyle = color;
                    ctx.fillText(text[i], width/2, sy+i*ch);
                }
            } else {
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fillText(text, width/2+2, height/2+2);
                ctx.fillStyle = color;
                ctx.fillText(text, width/2, height/2);
            }

            const tex = new THREE.CanvasTexture(c);
            tex.needsUpdate = true;
            return tex;
        }

        /* ═══════════════════════════════════════
           BUILD COUPLT BOARD
        ═══════════════════════════════════════ */
        function createCouplet(text){
            const g = new THREE.Group();
            const w=0.75, h=3.4;

            // Main board
            const board = addShadow(box(w, h, 0.1, M.redDark));
            board.position.y = h/2 + 0.15;
            g.add(board);

            // Gold frame
            const fm = M.gold;
            const t = 0.05;
            g.add(pos(box(w+0.1, t, 0.12, fm), 0, h+0.15+t/2, 0));
            g.add(pos(box(w+0.1, t, 0.12, fm), 0, 0.15-t/2, 0));
            g.add(pos(box(t, h+0.1, 0.12, fm), -w/2-t/2, h/2+0.15, 0));
            g.add(pos(box(t, h+0.1, 0.12, fm), w/2+t/2, h/2+0.15, 0));

            // Corner ornaments
            [[-1,-1],[1,-1],[-1,1],[1,1]].forEach(([sx,sy])=>{
                const orn = sph(0.04, 6, M.goldBright);
                orn.position.set(sx*(w/2+0.02), 0.15 + sy*(h/2+0.02), 0.06);
                g.add(orn);
            });

            // Text
            const tex = createTextTexture(text, {
                fontSize: 76, color: '#FFD700', bgColor: '#5a0e0e',
                width: 220, height: 540, vertical: true,
                borderColor: '#B8860B', borderWidth: 5
            });
            const tm = new THREE.MeshBasicMaterial({ map: tex, transparent: true });
            const tp = new THREE.Mesh(new THREE.PlaneGeometry(w*0.82, h*0.88), tm);
            tp.position.set(0, h/2+0.15, 0.055);
            g.add(tp);

            return g;
        }

        function createPlaque(text){
            const g = new THREE.Group();
            const w=3.4, h=1.0;

            g.add(box(w, h, 0.12, M.redDark));

            const fm = M.gold;
            g.add(pos(box(w+0.12, 0.06, 0.14, fm), 0, h/2+0.02, 0));
            g.add(pos(box(w+0.12, 0.06, 0.14, fm), 0, -h/2-0.02, 0));
            g.add(pos(box(0.06, h+0.12, 0.14, fm), -w/2-0.02, 0, 0));
            g.add(pos(box(0.06, h+0.12, 0.14, fm), w/2+0.02, 0, 0));

            const tex = createTextTexture(text, {
                fontSize: 90, color: '#FFD700', bgColor: '#5a0e0e',
                width: 440, height: 130, vertical: false,
                borderColor: '#B8860B', borderWidth: 4
            });
            const tm = new THREE.MeshBasicMaterial({ map: tex, transparent: true });
            const tp = new THREE.Mesh(new THREE.PlaneGeometry(w*0.85, h*0.7), tm);
            tp.position.z = 0.07;
            g.add(tp);

            return g;
        }

        function createHScroll(text){
            const g = new THREE.Group();
            const w=2.8, h=0.6;
            g.add(box(w, h, 0.07, M.redDark));
            g.add(pos(box(w+0.08, 0.04, 0.09, M.gold), 0, h/2+0.01, 0));
            g.add(pos(box(w+0.08, 0.04, 0.09, M.gold), 0, -h/2-0.01, 0));

            const tex = createTextTexture(text, {
                fontSize: 56, color: '#FFD700', bgColor: '#5a0e0e',
                width: 380, height: 90, vertical: false
            });
            const tm = new THREE.MeshBasicMaterial({ map: tex, transparent: true });
            const tp = new THREE.Mesh(new THREE.PlaneGeometry(w*0.88, h*0.7), tm);
            tp.position.z = 0.04;
            g.add(tp);
            return g;
        }

        /* ═══════════════════════════════════════
           CHINESE ROOF (refined)
        ═══════════════════════════════════════ */
        function createChineseRoof(halfW, halfD, peakH, overhang, curveUp){
            const seg = 24;
            const verts=[], uvs=[], idx=[];
            const w = halfW+overhang, d = halfD+overhang;

            for(let iz=0; iz<=seg; iz++){
                for(let ix=0; ix<=seg; ix++){
                    const u=ix/seg, v=iz/seg;
                    const x = -w + u*2*w;
                    const z = -d + v*2*d;
                    const zD = Math.abs(z)/d;
                    const xD = Math.abs(x)/w;

                    // Hip roof
                    const maxZD = Math.max(1 - xD*0.55, 0.01);
                    const nZ = Math.min(zD/maxZD, 1);
                    let y = peakH * (1 - nZ*nZ*0.55 - nZ*0.45);

                    // Eave curve (翘角)
                    const edgeDist = Math.sqrt(x*x/(w*w) + z*z/(d*d));
                    if(edgeDist > 0.7){
                        const t = (edgeDist-0.7)/0.3;
                        y += curveUp * t * t * t; // cubic for sharper upturn
                    }

                    // Ridge gentle arch
                    if(zD < 0.12){
                        const rt = zD/0.12;
                        y += 0.12 * Math.sin(rt * Math.PI);
                    }

                    verts.push(x, y, z);
                    uvs.push(u, v);
                }
            }

            for(let iz=0; iz<seg; iz++){
                for(let ix=0; ix<seg; ix++){
                    const a = iz*(seg+1)+ix;
                    const b = a+1;
                    const c = a+(seg+1);
                    const dd = c+1;
                    idx.push(a,c,b, b,c,dd);
                }
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
            geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
            geo.setIndex(idx);
            geo.computeVertexNormals();
            return geo;
        }

        /* ═══════════════════════════════════════
           DOUGONG BRACKETS (斗拱)
        ═══════════════════════════════════════ */
        function createDougong(scale){
            const g = new THREE.Group();
            const s = scale || 1;
            const mat = M.redDark;

            // Layer 1 - base block
            g.add(pos(box(0.5*s, 0.12*s, 0.5*s, mat), 0, 0.06*s, 0));
            // Layer 2 - cross beams

        function createBambooCluster(s){
            s = s||1;
            const g = new THREE.Group();
            const n = 5 + Math.floor(Math.random()*4);

            for(let i=0; i<n; i++){
                const sg = new THREE.Group();
                const h = (3+Math.random()*2.5)*s;

                const stalk = addShadow(cyl(r, r*1.15, h, 6, M.bamboo));
                stalk.position.y = h/2;
                sg.add(stalk);

                // Nodes
                const jc = Math.floor(h/(0.45*s));
                for(let j=1; j<jc; j++){
                    const jnt = torus(r*1.4, r*0.35, 6, M.bambooJoint);
                    jnt.position.y = j*0.45*s;
                    jnt.rotation.x = Math.PI/2;
                    sg.add(jnt);
                }

                // Leaves
                for(let l=0; l<4; l++){
                    const leaf = new THREE.Mesh(
                        new THREE.PlaneGeometry((0.3+Math.random()*0.2)*s, 0.06*s),
                        M.leafLight
                    );

                        (Math.random()-0.5)*0.3*s,
                        h - Math.random()*0.8*s,
                        (Math.random()-0.5)*0.3*s
                    );
                    leaf.rotation.set(Math.random()*0.5-0.25, Math.random()*Math.PI, Math.random()*0.3);
                    sg.add(leaf);
                }

                sg.position.set((Math.random()-0.5)*0.7*s, 0, (Math.random()-0.5)*0.7*s);
                sg.rotation.x = (Math.random()-0.5)*0.04;
                sg.rotation.z = (Math.random()-0.5)*0.04;
                g.add(sg);
            }
            return g;
        }

        /* ═══════════════════════════════════════

        function createStoneLantern(s){
            s = s||1;
            const g = new THREE.Group();

            // Base - hexagonal
            g.add(pos(cyl(0.35*s, 0.4*s, 0.12*s, 6, M.stone), 0, 0.06*s, 0));

            g.add(pos(box(0.3*s, 0.35*s, 0.3*s, M.stone), 0, 1.25*s, 0));

        /* ═══════════════════════════════════════
           SMOKE PARTICLES
        ═══════════════════════════════════════ */
        function createSmoke(){
            const n = 60;
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(n*3);
            const sizes = new Float32Array(n);
            const vels = [];

            for(let i=0;i<n;i++){
                pos[i*3] = (Math.random()-0.5)*0.25;
                pos[i*3+1] = Math.random()*3.5;
                pos[i*3+2] = (Math.random()-0.5)*0.25;
                sizes[i] = 0.08 + Math.random()*0.12;
                vels.push({
                    x: (Math.random()-0.5)*0.002,
                    y: 0.004 + Math.random()*0.007,
                    z: (Math.random()-0.5)*0.002
                });
            }

            geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
            geo.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1));

            const mat = new THREE.PointsMaterial({
                color: 0xcccccc, size: 0.12, transparent: true, opacity: 0.25,
                depthWrite: false, sizeAttenuation: true
            });

            const pts = new THREE.Points(geo, mat);
            pts.userData.vels = vels;
            return pts;
        }

        /* ═══════════════════════════════════════
           WINDOW LATTICE (窗棂)
        ═══════════════════════════════════════ */
        function createWindowLattice(w, h){
            const g = new THREE.Group();
            const mat = M.woodDark;
            const bar = 0.03;

            // Frame
            g.add(pos(box(w+bar*2, bar, bar, mat), 0, h/2, 0));
            g.add(pos(box(w+bar*2, bar, bar, mat), 0, -h/2, 0));
            g.add(pos(box(bar, h, bar, mat), -w/2, 0, 0));
            g.add(pos(box(bar, h, bar, mat), w/2, 0, 0));

            // Cross pattern
            const spacing = 0.18;
            const cols = Math.floor(w / spacing);
            const rows = Math.floor(h / spacing);

            for(let c=0; c<=cols; c++){
                const x = -w/2 + c*spacing;
                g.add(pos(box(bar, h, bar, mat), x, 0, 0));
            }
            for(let r=0; r<=rows; r++){
                const y = -h/2 + r*spacing;
                g.add(pos(box(w, bar, bar, mat), 0, y, 0));
            }

            return g;
        }

        const ceilGeo = new THREE.PlaneGeometry(13, 10);
        const ceil = new THREE.Mesh(ceilGeo, M.redDark);
        ceil.rotation.x = Math.PI/2;
        ceil.position.set(0, platH + 0.2 + pillarH + 0.15, 0);
        temple.add(ceil);

        // Ridge (正脊)
        const ridge = addShadow(cyl(0.1, 0.1, 11, 8, M.gold));
        ridge.rotation.x = Math.PI/2;
        ridge.position.set(0, platH + 0.2 + pillarH + 3.0, 0);
        temple.add(ridge);

        // Ridge end ornaments (鸱吻) - more detailed
        [-1,1].forEach(side=>{
            const ornG = new THREE.Group();
            // Body
            const body = addShadow(cone(0.18, 0.5, 6, M.gold));
            body.rotation.z = Math.PI;
            ornG.add(body);
            // Head
            const head = addShadow(sph(0.12, 6, M.goldBright));
            head.position.y = 0.3;
            ornG.add(head);
            // Tail curl
            const tail = addShadow(cone(0.08, 0.35, 4, M.gold));
            tail.position.set(0, -0.35, 0);
            tail.rotation.z = Math.PI * 0.65;
            ornG.add(tail);

            ornG.position.set(0, platH + 0.2 + pillarH + 3.0, side * 5.7);
            ornG.rotation.x = side * Math.PI/2;
            temple.add(ornG);
        });

        // Eave edge trim (瓦当滴水)
        const eaveH = platH + 0.2 + pillarH + 0.25;
        // Front eave
        const eaveF = addShadow(box(14.5, 0.06, 0.1, M.roofEdge));
        eaveF.position.set(0, eaveH, 7);
        temple.add(eaveF);
        // Back eave
        const eaveB = addShadow(box(14.5, 0.06, 0.1, M.roofEdge));
        eaveB.position.set(0, eaveH, -7);
        temple.add(eaveB);
        // Side eaves
        [-7.2, 7.2].forEach(x=>{
            const eave = addShadow(box(0.1, 0.06, 14.5, M.roofEdge));
            eave.position.set(x, eaveH, 0);
            temple.add(eave);
        });

        // Eave tile ends (瓦当) along front
        for(let i=-7; i<=7; i++){
            const tile = addShadow(cyl(0.06, 0.06, 0.08, 6, M.roofEdge));
            tile.position.set(i*0.95, eaveH-0.04, 7.05);
            tile.rotation.x = Math.PI/2;
            temple.add(tile);
        }

        // --- Interior ---
        // Altar table (供桌)
        const altarTable = addShadow(box(2.8, 0.85, 0.9, M.wood));
        altarTable.position.set(0, platH + 0.2 + 0.425, -2.2);
        temple.add(altarTable);

        // Table front apron (裙板)
        const apron = box(2.6, 0.4, 0.05, M.woodDark);
        apron.position.set(0, platH + 0.2 + 0.2, -1.72);
        temple.add(apron);

        // Table legs
        [[-1.2,-0.35],[1.2,-0.35],[-1.2,0.35],[1.2,0.35]].forEach(([x,z])=>{
            const leg = addShadow(cyl(0.06, 0.08, 0.85, 8, M.woodDark));
            leg.position.set(x, platH + 0.2 + 0.425, -2.2 + z);
            temple.add(leg);
        });

        // Spirit tablet (牌位) - larger, more detailed
        const tabletBase = addShadow(box(0.7, 0.15, 0.3, M.wood));
        tabletBase.position.set(0, platH + 0.2 + 0.925, -2.2);
        temple.add(tabletBase);

        const tablet = addShadow(box(0.5, 1.0, 0.08, M.woodDark));
        tablet.position.set(0, platH + 0.2 + 1.5, -2.2);
        temple.add(tablet);

        // Tablet top ornament
        const tabletTop = addShadow(cone(0.3, 0.15, 4, M.gold));
        tabletTop.position.set(0, platH + 0.2 + 2.05, -2.2);
        temple.add(tabletTop);

        // Tablet text
        const tabletTex = createTextTexture('先考\n神位', {
            fontSize: 50, color: '#FFD700', bgColor: '#3a1a08',
            width: 100, height: 200, vertical: true
        });
        const tabletTM = new THREE.MeshBasicMaterial({ map: tabletTex, transparent: true });
        const tabletTP = new THREE.Mesh(new THREE.PlaneGeometry(0.4, 0.85), tabletTM);
        tabletTP.position.set(0, platH + 0.2 + 1.5, -2.15);
        temple.add(tabletTP);

        // Candle holders + candles
        [-1.0, 1.0].forEach(x=>{
            const holder = addShadow(cyl(0.05, 0.07, 0.25, 8, M.bronze));
            holder.position.set(x, platH + 0.2 + 1.0, -2.2);
            temple.add(holder);
            const holderBase = addShadow(cyl(0.1, 0.12, 0.06, 8, M.bronze));
            holderBase.position.set(x, platH + 0.2 + 0.89, -2.2);
            temple.add(holderBase);

            const candle = addShadow(cyl(0.025, 0.025, 0.3, 6, M.candle));
            candle.position.set(x, platH + 0.2 + 1.3, -2.2);
            temple.add(candle);

            // Flame
            const flame = new THREE.Mesh(new THREE.SphereGeometry(0.03, 6, 4), M.flame);
            flame.position.set(x, platH + 0.2 + 1.48, -2.2);
            flame.scale.y = 1.5;
            flame.userData.isFlame = true;
            temple.add(flame);

            const fl = new THREE.PointLight(0xff8833, 0.35, 4);
            fl.position.set(x, platH + 0.2 + 1.5, -2.2);
            fl.userData.isCandleLight = true;
            temple.add(fl);
        });

        // Incense pot on altar
        const altarPot = addShadow(cyl(0.1, 0.08, 0.18, 8, M.bronze));
        altarPot.position.set(0, platH + 0.2 + 0.95, -2.2);
        temple.add(altarPot);

        // Offering fruits (stylized)
        [-0.5, 0, 0.5].forEach((x,i)=>{
            const fruit = addShadow(sph(0.06, 6, new THREE.MeshStandardMaterial({
                color: i===1 ? 0xff6600 : 0xffcc00, roughness: 0.6
            })));
            fruit.position.set(x, platH + 0.2 + 0.92, -2.0);
            temple.add(fruit);
        });

        scene.add(temple);

        /* ═══════════════════════════════════════
           ENVIRONMENT
        ═══════════════════════════════════════ */

        // Incense burner in front
        const burner = createIncenseBurner();
        burner.position.set(0, 0, 8.5);
        scene.add(burner);

        // Smoke
        const smoke = createSmoke();
        smoke.position.set(0, 0.9, 8.5);
        scene.add(smoke);

        // Stone lanterns
        [[-3.5,0,6.5],[3.5,0,6.5],[-3.5,0,11],[3.5,0,11],[-3.5,0,15.5],[3.5,0,15.5]].forEach(([x,y,z])=>{
            const l = createStoneLantern(0.85);
            l.position.set(x,y,z);
            scene.add(l);
        });

        // Trees
        // 枇杷树
        [[-10,0,-2],[11,0,1],[-9,0,5.5]].forEach(([x,y,z])=>{
            const t = createLoquatTree(1.15);
            t.position.set(x,y,z);
            t.rotation.y = Math.random()*Math.PI*2;
            scene.add(t);
        });

        // 柚子树
        [[10,0,-3],[-11,0,-6.5],[9,0,6.5]].forEach(([x,y,z])=>{
            const t = createPomeloTree(1.05);
            t.position.set(x,y,z);
            t.rotation.y = Math.random()*Math.PI*2;
            scene.add(t);
        });

        // 松树
        [[-8,0,-8.5],[8,0,-7.5],[-12,0,2]].forEach(([x,y,z])=>{
            const t = createPineTree(1.05);
            t.position.set(x,y,z);
            t.rotation.y = Math.random()*Math.PI*2;
            scene.add(t);
        });

        // 柏树
        [[-6.5,0,8.5],[6.5,0,8.5],[-5.5,0,-5.5],[5.5,0,-5.5]].forEach(([x,y,z])=>{
            const t = createCypressTree(0.95);
            t.position.set(x,y,z);
            t.rotation.y = Math.random()*Math.PI*2;
            scene.add(t);
        });

        // 竹丛
        [[-12,0,-4,1.3],[12,0,-1,1.1],[-10,0,8.5,1.0]].forEach(([x,y,z,s])=>{
            const b = createBambooCluster(s);
            b.position.set(x,y,z);
            scene.add(b);
        });

        // 桂花树
        [[12,0,4],[-11,0,-1]].forEach(([x,y,z])=>{
            const t = createOsmanthusTree(1.05);
            t.position.set(x,y,z);
            t.rotation.y = Math.random()*Math.PI*2;
            scene.add(t);
        });

        // Scattered rocks
        for(let i=0; i<20; i++){
            const a = Math.random()*Math.PI*2;
            const d = 8 + Math.random()*14;
            const rock = addShadow(sph(0.15+Math.random()*0.35, 5, M.stoneDark));
            rock.position.set(Math.cos(a)*d, 0.08, Math.sin(a)*d);
            rock.scale.set(1+Math.random()*0.5, 0.4+Math.random()*0.4, 1+Math.random()*0.5);
            rock.rotation.y = Math.random()*Math.PI;
            scene.add(rock);
        }

        // --- Sky dome ---
        const skyGeo = new THREE.SphereGeometry(90, 32, 16);
        const skyMat = new THREE.ShaderMaterial({
            uniforms: {
                topColor: { value: new THREE.Color(0x4a8ec2) },
                bottomColor: { value: new THREE.Color(0xc8dce8) },
                offset: { value: 12 },
                exponent: { value: 0.45 }
            },
            vertexShader: `
                varying vec3 vWP;
                void main(){
                    vWP = (modelMatrix * vec4(position,1.0)).xyz;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
                }
            `,
            fragmentShader: `
                uniform vec3 topColor, bottomColor;
                uniform float offset, exponent;
                varying vec3 vWP;
                void main(){
                    float h = normalize(vWP + offset).y;
                    gl_FragColor = vec4(mix(bottomColor, topColor, max(pow(max(h,0.0), exponent), 0.0)), 1.0);
                }
            `,
            side: THREE.BackSide
        });
        scene.add(new THREE.Mesh(skyGeo, skyMat));

        /* ═══════════════════════════════════════
           ANIMATION
        ═══════════════════════════════════════ */
        let autoRotate = false;
        const clock = new THREE.Clock();
        const flames = [];
        const candleLights = [];
        temple.traverse(child => {
            if(child.userData.isFlame) flames.push(child);
            if(child.userData.isCandleLight) candleLights.push(child);
        });

        function animate(){
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            const t = clock.getElapsedTime();

            controls.autoRotate = autoRotate;
            controls.autoRotateSpeed = 1.2;
            controls.update();

            // Smoke
            const sp = smoke.geometry.attributes.position;
            const vels = smoke.userData.vels;
            for(let i=0; i<vels.length; i++){
                let y = sp.getY(i);
                y += vels[i].y;
                if(y > 3.5){
                    y = 0;
                    sp.setX(i, (Math.random()-0.5)*0.25);
                    sp.setZ(i, (Math.random()-0.5)*0.25);
                }
                sp.setX(i, sp.getX(i) + vels[i].x + Math.sin(t*0.7+i)*0.0008);
                sp.setY(i, y);
                sp.setZ(i, sp.getZ(i) + vels[i].z + Math.cos(t*0.5+i)*0.0008);
            }
            sp.needsUpdate = true;

            // Flame flicker
            flames.forEach((f,i) => {
                f.scale.y = 1.3 + Math.sin(t*8+i*3)*0.3 + Math.sin(t*13+i)*0.15;
                f.scale.x = 0.8 + Math.sin(t*6+i*2)*0.2;
            });
            candleLights.forEach((l,i) => {
                l.intensity = 0.3 + Math.sin(t*7+i*2)*0.08 + Math.sin(t*11+i)*0.04;
            });

            // Interior glow
            interiorGlow.intensity = 0.55 + Math.sin(t*4)*0.08;

            renderer.render(scene, camera);
        }

        // Loading
        const loadBar = document.getElementById('load-bar');
        let prog = 0;
        const li = setInterval(()=>{
            prog += Math.random()*18 + 4;
            if(prog >= 100){
                prog = 100;
                loadBar.style.width = '100%';
                clearInterval(li);
                setTimeout(()=> document.getElementById('loading').classList.add('hidden'), 500);
            } else {
                loadBar.style.width = prog+'%';
            }
        }, 80);

        animate();

        // Resize
        addEventListener('resize', ()=>{
            camera.aspect = innerWidth/innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });

        // Button handlers
        window.resetCamera = ()=>{
            controls.target.set(0, 3.8, 0);
            camera.position.set(0, 9, 24);
            controls.update();
        };
        window.toggleAutoRotate = ()=>{ autoRotate = !autoRotate; };
        window.toggleInfo = ()=>{ document.getElementById('info-panel').classList.toggle('show'); };

    })();
    </script>
</body>
</html>
