<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>永怀堂 - 纪念寺庙</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;background:#1a1a2e;font-family:'KaiTi','STKaiti','PingFang SC',serif}
        canvas{display:block;touch-action:none}
        #loading{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity 1s}
        #loading.done{opacity:0;pointer-events:none}
        #loading h2{color:#FFD700;font-size:2em;letter-spacing:.6em;margin-bottom:8px}
        #loading p{color:rgba(255,215,0,.5);font-size:.85em;letter-spacing:.3em;margin-bottom:24px}
        #loading .bar{width:180px;height:2px;background:rgba(255,215,0,.15);border-radius:1px;overflow:hidden}
        #loading .bar-fill{width:0%;height:100%;background:linear-gradient(90deg,#FFD700,#FFA500);transition:width .3s}
        #loading .err{color:#ff6b6b;font-size:.8em;margin-top:16px;display:none;text-align:center;padding:0 20px}
        #overlay{position:fixed;top:0;left:0;width:100%;pointer-events:none;z-index:10;text-align:center;padding:18px}
        #overlay h1{color:#FFD700;font-size:1.5em;letter-spacing:.5em;text-shadow:0 2px 12px rgba(0,0,0,.7),0 0 30px rgba(255,215,0,.15)}
        #overlay p{color:rgba(255,255,255,.4);font-size:.7em;margin-top:5px;letter-spacing:.2em}
        #controls{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:8px}
        #controls button{background:rgba(0,0,0,.5);color:#e8d5a0;border:1px solid rgba(255,215,0,.2);padding:7px 16px;border-radius:20px;font-family:inherit;font-size:.75em;cursor:pointer;-webkit-tap-highlight-color:transparent;backdrop-filter:blur(10px);transition:all .2s}
        #controls button:active{background:rgba(255,215,0,.12);transform:scale(.96)}
        #info-panel{position:fixed;bottom:64px;left:50%;transform:translateX(-50%);z-index:10;background:rgba(10,8,5,.75);color:#e0d5c0;padding:14px 22px;border-radius:14px;font-size:.78em;line-height:2;text-align:center;max-width:88vw;backdrop-filter:blur(12px);border:1px solid rgba(255,215,0,.12);display:none}
        #info-panel.show{display:block}
        #info-panel .label{color:#c9a84c;font-size:.9em}
    </style>
</head>
<body>
    <div id="loading">
        <h2>永怀堂</h2>
        <p>纪念先父</p>
        <div class="bar"><div class="bar-fill" id="load-bar"></div></div>
        <div class="err" id="load-err">加载失败，请刷新页面重试</div>
    </div>
    <div id="overlay">
        <h1>永怀堂</h1>
        <p>双指缩放 · 单指旋转</p>
    </div>
    <div id="controls">
        <button onclick="resetCamera()">复位</button>
        <button onclick="toggleAutoRotate()">旋转</button>
        <button onclick="toggleInfo()">对联</button>
    </div>
    <div id="info-panel">
        <div class="label">—— 殿堂对联 ——</div>
        <div>上联（右）：广堡深恩似海长</div>
        <div>下联（左）：侃君厚德如山重</div>
        <div class="label" style="margin-top:4px">横批：祖德流芳</div>
    </div>

    <script>
    // Load Three.js with fallback CDNs
    var THREE_SCRIPTS = [
        'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js',
        'https://unpkg.com/three@0.160.0/build/three.min.js',
        'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js'
    ];
    var OC_SCRIPTS = [
        'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js',
        'https://unpkg.com/three@0.160.0/examples/js/controls/OrbitControls.js',
        'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js'
    ];

    function loadScript(urls, idx, cb) {
        if (idx >= urls.length) { cb(false); return; }
        var s = document.createElement('script');
        s.src = urls[idx];
        s.onload = function() { cb(true); };
        s.onerror = function() { loadScript(urls, idx+1, cb); };
        document.head.appendChild(s);
    }

    loadScript(THREE_SCRIPTS, 0, function(ok1) {
        if (!ok1) { showError(); return; }
        loadScript(OC_SCRIPTS, 0, function(ok2) {
            if (!ok2) { showError(); return; }
            if (typeof THREE === 'undefined' || typeof THREE.OrbitControls === 'undefined') {
                showError(); return;
            }
            startScene();
        });
    });

    function showError() {
        document.getElementById('load-err').style.display = 'block';
        document.getElementById('load-bar').style.background = '#ff6b6b';
    }

    function startScene() {
    (function(){
        'use strict';

        // ═══ SCENE ═══
        var scene = new THREE.Scene();
        scene.background = new THREE.Color(0x8fb8d0);
        scene.fog = new THREE.FogExp2(0x9db8c7, 0.008);

        var camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 300);
        camera.position.set(0, 9, 24);

        var renderer = new THREE.WebGLRenderer({antialias:true});
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.15;
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.body.appendChild(renderer.domElement);

        var controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.07;
        controls.minDistance = 5;
        controls.maxDistance = 50;
        controls.maxPolarAngle = Math.PI / 2.02;
        controls.target.set(0, 3.8, 0);
        controls.update();

        // ═══ LIGHTING ═══
        scene.add(new THREE.AmbientLight(0xffeedd, 0.45));
        var sun = new THREE.DirectionalLight(0xfff5e0, 1.1);
        sun.position.set(12, 22, 8);
        sun.castShadow = true;
        sun.shadow.mapSize.set(2048, 2048);
        sun.shadow.camera.near = 0.5;
        sun.shadow.camera.far = 60;
        var sc = 28;
        sun.shadow.camera.left = -sc;
        sun.shadow.camera.right = sc;
        sun.shadow.camera.top = sc;
        sun.shadow.camera.bottom = -sc;
        sun.shadow.bias = -0.0005;
        scene.add(sun);
        scene.add(new THREE.DirectionalLight(0xaaccff, 0.25).translateX(-8).translateY(8));
        var interiorGlow = new THREE.PointLight(0xff9944, 0.6, 14);
        interiorGlow.position.set(0, 4.5, -1);
        scene.add(interiorGlow);

        // ═══ TEXTURES ═══
        function makeTex(w, h, fn) {
            var c = document.createElement('canvas');
            c.width = w; c.height = h;
            fn(c.getContext('2d'), w, h);
            var t = new THREE.CanvasTexture(c);
            t.wrapS = t.wrapT = THREE.RepeatWrapping;
            return t;
        }

        var stoneTex = makeTex(256, 256, function(ctx, w, h) {
            ctx.fillStyle = '#8a8a7a';
            ctx.fillRect(0, 0, w, h);
            for (var i = 0; i < 3000; i++) {
                var v = 120 + Math.random() * 40;
                ctx.fillStyle = 'rgba(' + v + ',' + v + ',' + (v-10) + ',0.15)';
                ctx.fillRect(Math.random()*w, Math.random()*h, 1+Math.random()*2, 1+Math.random()*2);
            }
        });

        var roofTex = makeTex(256, 256, function(ctx, w, h) {
            ctx.fillStyle = '#2a2a2a';
            ctx.fillRect(0, 0, w, h);
            for (var row = 0; row < h/24; row++) {
                var off = (row % 2) * 16;
                for (var col = -1; col < w/32+1; col++) {
                    var shade = 30 + Math.random() * 20;
                    ctx.fillStyle = 'rgb(' + shade + ',' + shade + ',' + shade + ')';
                    ctx.beginPath();
                    ctx.arc(col*32+off+16, row*24+12, 14, 0, Math.PI, false);
                    ctx.fill();
                }
            }
        });
        roofTex.repeat.set(3, 3);

        var grassTex = makeTex(256, 256, function(ctx, w, h) {
            ctx.fillStyle = '#4a7c3f';
            ctx.fillRect(0, 0, w, h);
            for (var i = 0; i < 5000; i++) {
                var g = 80 + Math.random() * 80;
                ctx.strokeStyle = 'rgba(' + (30+Math.random()*40) + ',' + g + ',' + (20+Math.random()*30) + ',0.4)';
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                var x = Math.random()*w, y = Math.random()*h;
                ctx.moveTo(x, y);
                ctx.lineTo(x+(Math.random()-0.5)*4, y-2-Math.random()*5);
                ctx.stroke();
            }
        });
        grassTex.repeat.set(8, 8);

        var pathTex = makeTex(128, 128, function(ctx, w, h) {
            ctx.fillStyle = '#9e9685';
            ctx.fillRect(0, 0, w, h);
            for (var row = 0; row < h/32; row++)
                for (var col = 0; col < w/32; col++) {
                    var v = 140 + Math.random() * 30;
                    ctx.fillStyle = 'rgb(' + v + ',' + (v-5) + ',' + (v-15) + ')';
                    ctx.fillRect(col*32+1, row*32+1, 30, 30);
                }
        });
        pathTex.repeat.set(2, 6);

        var pillarTex = makeTex(64, 256, function(ctx, w, h) {
            var grad = ctx.createLinearGradient(0, 0, w, 0);
            grad.addColorStop(0, '#6B0F0F');
            grad.addColorStop(0.2, '#9B2020');
            grad.addColorStop(0.5, '#A82828');
            grad.addColorStop(0.8, '#9B2020');
            grad.addColorStop(1, '#6B0F0F');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);
        });

        // ═══ MATERIALS ═══
        var M = {
            stone: new THREE.MeshStandardMaterial({map:stoneTex, roughness:0.92, metalness:0.02}),
            stoneDark: new THREE.MeshStandardMaterial({color:0x6b6b5e, roughness:0.95}),
            stoneLight: new THREE.MeshStandardMaterial({color:0xa09a8a, roughness:0.9}),
            red: new THREE.MeshStandardMaterial({map:pillarTex, roughness:0.55, metalness:0.08}),
            redDark: new THREE.MeshStandardMaterial({color:0x5a0e0e, roughness:0.65}),
            wood: new THREE.MeshStandardMaterial({color:0x5C3317, roughness:0.75}),
            woodDark: new THREE.MeshStandardMaterial({color:0x3a1a08, roughness:0.8}),
            gold: new THREE.MeshStandardMaterial({color:0xDAA520, roughness:0.25, metalness:0.7}),
            goldBright: new THREE.MeshStandardMaterial({color:0xFFD700, roughness:0.2, metalness:0.8}),
            roof: new THREE.MeshStandardMaterial({map:roofTex, roughness:0.75}),
            grass: new THREE.MeshStandardMaterial({map:grassTex, roughness:0.95}),
            path: new THREE.MeshStandardMaterial({map:pathTex, roughness:0.88}),
            bronze: new THREE.MeshStandardMaterial({color:0x6B5B3A, roughness:0.35, metalness:0.6}),
            white: new THREE.MeshStandardMaterial({color:0xf0ebe0, roughness:0.85}),
            trunk: new THREE.MeshStandardMaterial({color:0x4a3728, roughness:0.92}),
            trunkDark: new THREE.MeshStandardMaterial({color:0x3a2a1a, roughness:0.92}),
            leafDark: new THREE.MeshStandardMaterial({color:0x2d5a1e, roughness:0.88}),
            leafMid: new THREE.MeshStandardMaterial({color:0x3d7a2e, roughness:0.88}),
            leafLight: new THREE.MeshStandardMaterial({color:0x5a9a3e, roughness:0.88}),
            leafLoquat: new THREE.MeshStandardMaterial({color:0x2a5520, roughness:0.85}),
            leafPomelo: new THREE.MeshStandardMaterial({color:0x3a6a2a, roughness:0.85}),
            bamboo: new THREE.MeshStandardMaterial({color:0x4a8a30, roughness:0.65}),
            bambooJoint: new THREE.MeshStandardMaterial({color:0x5a9a40, roughness:0.55}),
            candle: new THREE.MeshStandardMaterial({color:0xfff8dc, emissive:0xff6600, emissiveIntensity:0.4}),
            flame: new THREE.MeshBasicMaterial({color:0xff8833}),
        };

        // ═══ HELPERS ═══
        function box(w,h,d,mat){return new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat)}
        function cyl(rt,rb,h,seg,mat){return new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,seg),mat)}
        function sph(r,seg,mat){return new THREE.Mesh(new THREE.SphereGeometry(r,seg,seg),mat)}
        function cone(r,h,seg,mat){return new THREE.Mesh(new THREE.ConeGeometry(r,h,seg),mat)}
        function torus(R,r,seg,mat){return new THREE.Mesh(new THREE.TorusGeometry(R,r,seg,seg*2),mat)}
        function pos(m,x,y,z){m.position.set(x,y,z);return m}
        function addSh(m){m.castShadow=true;m.receiveShadow=true;return m}

        // ═══ TEXT TEXTURES ═══
        function createTextTex(text, opts) {
            opts = opts || {};
            var fs = opts.fontSize || 64;
            var color = opts.color || '#000';
            var bg = opts.bgColor || '#FFF';
            var w = opts.width || 256;
            var h = opts.height || 512;
            var vert = opts.vertical !== false;
            var bc = opts.borderColor || null;
            var bw = opts.borderWidth || 4;

            var c = document.createElement('canvas');
            c.width = w; c.height = h;
            var ctx = c.getContext('2d');

            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, w, h);

            if (bc) {
                ctx.strokeStyle = bc;
                ctx.lineWidth = bw;
                ctx.strokeRect(bw/2, bw/2, w-bw, h-bw);
                ctx.lineWidth = 1;
                ctx.strokeRect(bw+5, bw+5, w-2*(bw+5), h-2*(bw+5));
            }

            ctx.font = 'bold ' + fs + 'px KaiTi, STKaiti, "PingFang SC", serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            if (vert) {
                var ch = fs * 1.35;
                var sy = (h - text.length * ch) / 2 + ch / 2;
                for (var i = 0; i < text.length; i++) {
                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                    ctx.fillText(text[i], w/2+2, sy+i*ch+2);
                    ctx.fillStyle = color;
                    ctx.fillText(text[i], w/2, sy+i*ch);
                }
            } else {
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fillText(text, w/2+2, h/2+2);
                ctx.fillStyle = color;
                ctx.fillText(text, w/2, h/2);
            }

            var tex = new THREE.CanvasTexture(c);
            tex.needsUpdate = true;
            return tex;
        }

        // ═══ COUPLT BOARD ═══
        function createCouplet(text) {
            var g = new THREE.Group();
            var w = 0.75, h = 3.4;
            g.add(pos(addSh(box(w, h, 0.1, M.redDark)), 0, h/2+0.15, 0));
            var t = 0.05;
            g.add(pos(box(w+0.1, t, 0.12, M.gold), 0, h+0.15+t/2, 0));
            g.add(pos(box(w+0.1, t, 0.12, M.gold), 0, 0.15-t/2, 0));
            g.add(pos(box(t, h+0.1, 0.12, M.gold), -w/2-t/2, h/2+0.15, 0));
            g.add(pos(box(t, h+0.1, 0.12, M.gold), w/2+t/2, h/2+0.15, 0));

            var tex = createTextTex(text, {
                fontSize:76, color:'#FFD700', bgColor:'#5a0e0e',
                width:220, height:540, vertical:true,
                borderColor:'#B8860B', borderWidth:5
            });
            var tm = new THREE.MeshBasicMaterial({map:tex, transparent:true});
            var tp = new THREE.Mesh(new THREE.PlaneGeometry(w*0.82, h*0.88), tm);
            tp.position.set(0, h/2+0.15, 0.055);
            g.add(tp);
            return g;
        }

        function createPlaque(text) {
            var g = new THREE.Group();
            var w = 3.4, h = 1.0;
            g.add(box(w, h, 0.12, M.redDark));
            g.add(pos(box(w+0.12, 0.06, 0.14, M.gold), 0, h/2+0.02, 0));
            g.add(pos(box(w+0.12, 0.06, 0.14, M.gold), 0, -h/2-0.02, 0));
            g.add(pos(box(0.06, h+0.12, 0.14, M.gold), -w/2-0.02, 0, 0));
            g.add(pos(box(0.06, h+0.12, 0.14, M.gold), w/2+0.02, 0, 0));
            var tex = createTextTex(text, {
                fontSize:90, color:'#FFD700', bgColor:'#5a0e0e',
                width:440, height:130, vertical:false,
                borderColor:'#B8860B', borderWidth:4
            });
            var tm = new THREE.MeshBasicMaterial({map:tex, transparent:true});
            var tp = new THREE.Mesh(new THREE.PlaneGeometry(w*0.85, h*0.7), tm);
            tp.position.z = 0.07;
            g.add(tp);
            return g;
        }

        function createHScroll(text) {
            var g = new THREE.Group();
            var w = 2.8, h = 0.6;
            g.add(box(w, h, 0.07, M.redDark));
            g.add(pos(box(w+0.08, 0.04, 0.09, M.gold), 0, h/2+0.01, 0));
            g.add(pos(box(w+0.08, 0.04, 0.09, M.gold), 0, -h/2-0.01, 0));
            var tex = createTextTex(text, {
                fontSize:56, color:'#FFD700', bgColor:'#5a0e0e',
                width:380, height:90, vertical:false
            });
            var tm = new THREE.MeshBasicMaterial({map:tex, transparent:true});
            var tp = new THREE.Mesh(new THREE.PlaneGeometry(w*0.88, h*0.7), tm);
            tp.position.z = 0.04;
            g.add(tp);
            return g;
        }

        // ═══ ROOF ═══
        function createRoof(halfW, halfD, peakH, overhang, curveUp) {
            var seg = 20;
            var verts = [], uvs = [], idx = [];
            var w = halfW + overhang, d = halfD + overhang;
            for (var iz = 0; iz <= seg; iz++) {
                for (var ix = 0; ix <= seg; ix++) {
                    var u = ix/seg, v = iz/seg;
                    var x = -w + u*2*w;
                    var z = -d + v*2*d;
                    var zD = Math.abs(z)/d;
                    var xD = Math.abs(x)/w;
                    var maxZD = Math.max(1 - xD*0.55, 0.01);
                    var nZ = Math.min(zD/maxZD, 1);
                    var y = peakH * (1 - nZ*nZ*0.55 - nZ*0.45);
                    var edgeDist = Math.sqrt(x*x/(w*w) + z*z/(d*d));
                    if (edgeDist > 0.7) {
                        var t = (edgeDist - 0.7) / 0.3;
                        y += curveUp * t * t * t;
                    }
                    if (zD < 0.12) {
                        var rt = zD / 0.12;
                        y += 0.12 * Math.sin(rt * Math.PI);
                    }
                    verts.push(x, y, z);
                    uvs.push(u, v);
                }
            }
            for (var iz = 0; iz < seg; iz++) {
                for (var ix = 0; ix < seg; ix++) {
                    var a = iz*(seg+1)+ix, b = a+1, c = a+(seg+1), dd = c+1;
                    idx.push(a,c,b, b,c,dd);
                }
            }
            var geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
            geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
            geo.setIndex(idx);
            geo.computeVertexNormals();
            return geo;
        }

        // ═══ DOUGONG ═══
        function createDougong(s) {
            var g = new THREE.Group();
            var mat = M.redDark;
            g.add(pos(box(0.5*s, 0.12*s, 0.5*s, mat), 0, 0.06*s, 0));
            g.add(pos(box(0.7*s, 0.08*s, 0.15*s, mat), 0, 0.16*s, 0));
            g.add(pos(box(0.15*s, 0.08*s, 0.7*s, mat), 0, 0.16*s, 0));
            g.add(pos(box(0.9*s, 0.08*s, 0.15*s, mat), 0, 0.24*s, 0));
            g.add(pos(box(0.15*s, 0.08*s, 0.9*s, mat), 0, 0.24*s, 0));
            g.add(pos(box(0.6*s, 0.1*s, 0.6*s, mat), 0, 0.33*s, 0));
            return g;
        }

        // ═══ TREES ═══
        function createLoquatTree(s) {
            s = s || 1;
            var g = new THREE.Group();
            g.add(pos(addSh(cyl(0.1*s, 0.2*s, 2.8*s, 8, M.trunk)), 0, 1.4*s, 0));
            g.add(pos(addSh(cyl(0.04*s, 0.08*s, 1.2*s, 6, M.trunk)), 0.3*s, 2.2*s, 0.2*s));
            var ps = [[0,3.4,0,1.6],[-0.9,3.0,0.5,1.2],[0.8,3.1,-0.4,1.3],[0,4.0,0.2,1.1],[-0.5,3.6,-0.5,1.0],[0.4,2.8,0.6,1.1],[-0.3,3.2,-0.2,1.4],[0.6,3.5,0.3,1.0],[0.1,3.8,-0.4,0.9],[-0.7,3.4,0.1,1.1]];
            ps.forEach(function(p) {
                var sp = addSh(sph(p[3]*s, 7, M.leafLoquat));
                sp.position.set(p[0]*s, p[1]*s, p[2]*s);
                sp.scale.y = 0.7 + Math.random()*0.3;
                g.add(sp);
            });
            return g;
        }

        function createPomeloTree(s) {
            s = s || 1;
            var g = new THREE.Group();
            g.add(pos(addSh(cyl(0.09*s, 0.18*s, 3.0*s, 8, M.trunk)), 0, 1.5*s, 0));
            var ps = [[0,3.6,0,1.7],[-0.7,3.3,0.3,1.3],[0.6,3.4,-0.3,1.4],[0,4.2,0,1.2],[-0.4,3.8,-0.4,1.1],[0.3,3.1,0.5,1.2],[0.5,3.7,0.2,1.0],[-0.6,3.5,-0.1,1.1]];
            ps.forEach(function(p) {
                var sp = addSh(sph(p[3]*s, 7, M.leafPomelo));
                sp.position.set(p[0]*s, p[1]*s, p[2]*s);
                sp.scale.y = 0.75 + Math.random()*0.25;
                g.add(sp);
            });
            return g;
        }

        function createPineTree(s) {
            s = s || 1;
            var g = new THREE.Group();
            g.add(pos(addSh(cyl(0.07*s, 0.16*s, 3.2*s, 8, M.trunkDark)), 0, 1.6*s, 0));
            [[0,2.8,0,1.6,1.4],[0,3.7,0,1.3,1.1],[0,4.4,0,0.9,1.0],[0,5.0,0,0.5,0.8]].forEach(function(p) {
                g.add(pos(addSh(cone(p[3]*s, p[4]*s, 8, M.leafDark)), p[0]*s, p[1]*s, p[2]*s));
            });
            return g;
        }

        function createCypressTree(s) {
            s = s || 1;
            var g = new THREE.Group();
            g.add(pos(addSh(cyl(0.05*s, 0.12*s, 3.8*s, 8, M.trunkDark)), 0, 1.9*s, 0));
            [[0,3.2,0,0.85,2.2],[0,4.5,0,0.65,1.6],[0,5.4,0,0.4,1.3],[0,6.1,0,0.2,1.0]].forEach(function(p) {
                g.add(pos(addSh(cone(p[3]*s, p[4]*s, 8, M.leafMid)), p[0]*s, p[1]*s, p[2]*s));
            });
            return g;
        }

        function createBambooCluster(s) {
            s = s || 1;
            var g = new THREE.Group();
            var n = 5 + Math.floor(Math.random()*4);
            for (var i = 0; i < n; i++) {
                var sg = new THREE.Group();
                var h = (3+Math.random()*2.5)*s;
                var r = (0.025+Math.random()*0.02)*s;
                sg.add(pos(addSh(cyl(r, r*1.15, h, 6, M.bamboo)), 0, h/2, 0));
                var jc = Math.floor(h/(0.45*s));
                for (var j = 1; j < jc; j++) {
                    var jnt = torus(r*1.4, r*0.35, 6, M.bambooJoint);
                    jnt.position.y = j*0.45*s;
                    jnt.rotation.x = Math.PI/2;
                    sg.add(jnt);
                }
                for (var l = 0; l < 4; l++) {
                    var leaf = new THREE.Mesh(new THREE.PlaneGeometry((0.3+Math.random()*0.2)*s, 0.06*s), M.leafLight);
                    leaf.position.set((Math.random()-0.5)*0.3*s, h-Math.random()*0.8*s, (Math.random()-0.5)*0.3*s);
                    leaf.rotation.set(Math.random()*0.5-0.25, Math.random()*Math.PI, Math.random()*0.3);
                    sg.add(leaf);
                }
                sg.position.set((Math.random()-0.5)*0.7*s, 0, (Math.random()-0.5)*0.7*s);
                g.add(sg);
            }
            return g;
        }

        function createOsmanthusTree(s) {
            s = s || 1;
            var g = new THREE.Group();
            g.add(pos(addSh(cyl(0.08*s, 0.15*s, 2.4*s, 8, M.trunk)), 0, 1.2*s, 0));
            [[0,3.0,0,1.5],[-0.8,2.7,0.4,1.2],[0.7,2.8,-0.3,1.3],[0,3.6,0.2,1.1],[-0.4,3.2,-0.3,1.2],[0.5,3.3,0.1,1.0]].forEach(function(p) {
                var sp = addSh(sph(p[3]*s, 7, M.leafMid));
                sp.position.set(p[0]*s, p[1]*s, p[2]*s);
                sp.scale.y = 0.7+Math.random()*0.3;
                g.add(sp);
            });
            return g;
        }

        // ═══ STONE LANTERN ═══
        function createLantern(s) {
            s = s || 1;
            var g = new THREE.Group();
            g.add(pos(cyl(0.35*s, 0.4*s, 0.12*s, 6, M.stone), 0, 0.06*s, 0));
            g.add(pos(cyl(0.07*s, 0.09*s, 0.9*s, 6, M.stone), 0, 0.57*s, 0));
            g.add(pos(cyl(0.28*s, 0.25*s, 0.06*s, 6, M.stone), 0, 1.05*s, 0));
            g.add(pos(box(0.3*s, 0.35*s, 0.3*s, M.stone), 0, 1.25*s, 0));
            var rm = cone(0.38*s, 0.3*s, 6, M.stoneDark);
            rm.position.y = 1.58*s;
            rm.rotation.y = Math.PI/6;
            g.add(rm);
            g.add(pos(sph(0.05*s, 6, M.stone), 0, 1.78*s, 0));
            g.add(pos(cyl(0.03*s, 0.03*s, 0.12*s, 6, M.stone), 0, 1.85*s, 0));
            var glow = new THREE.PointLight(0xffaa44, 0.25, 3);
            glow.position.y = 1.25*s;
            g.add(glow);
            return g;
        }

        // ═══ INCENSE BURNER ═══
        function createBurner() {
            var g = new THREE.Group();
            g.add(pos(cyl(0.7, 0.75, 0.1, 12, M.stone), 0, 0.05, 0));
            g.add(pos(addSh(cyl(0.45, 0.3, 0.7, 16, M.bronze)), 0, 0.45, 0));
            g.add(pos(torus(0.48, 0.03, 8, M.gold), 0, 0.35, 0));
            g.add(pos(torus(0.45, 0.04, 8, M.bronze), 0, 0.8, 0));
            g.add(pos(cyl(0.5, 0.45, 0.08, 16, M.bronze), 0, 0.84, 0));
            for (var i = 0; i < 3; i++) {
                var a = (i/3)*Math.PI*2;
                g.add(pos(addSh(cyl(0.04, 0.06, 0.2, 6, M.bronze)), Math.cos(a)*0.35, 0.1, Math.sin(a)*0.35));
            }
            return g;
        }

        // ═══ SMOKE ═══
        var smokePts;
        function createSmoke() {
            var n = 50;
            var geo = new THREE.BufferGeometry();
            var p = new Float32Array(n*3);
            var vels = [];
            for (var i = 0; i < n; i++) {
                p[i*3] = (Math.random()-0.5)*0.25;
                p[i*3+1] = Math.random()*3.5;
                p[i*3+2] = (Math.random()-0.5)*0.25;
                vels.push({x:(Math.random()-0.5)*0.002, y:0.004+Math.random()*0.007, z:(Math.random()-0.5)*0.002});
            }
            geo.setAttribute('position', new THREE.Float32BufferAttribute(p, 3));
            var mat = new THREE.PointsMaterial({color:0xcccccc, size:0.12, transparent:true, opacity:0.25, depthWrite:false, sizeAttenuation:true});
            smokePts = new THREE.Points(geo, mat);
            smokePts.userData.vels = vels;
            return smokePts;
        }

        // ═══ WINDOW LATTICE ═══
        function createWindow(w, h) {
            var g = new THREE.Group();
            var mat = M.woodDark;
            var bar = 0.03;
            g.add(pos(box(w+bar*2, bar, bar, mat), 0, h/2, 0));
            g.add(pos(box(w+bar*2, bar, bar, mat), 0, -h/2, 0));
            g.add(pos(box(bar, h, bar, mat), -w/2, 0, 0));
            g.add(pos(box(bar, h, bar, mat), w/2, 0, 0));
            var sp = 0.18;
            for (var c = 0; c <= Math.floor(w/sp); c++)
                g.add(pos(box(bar, h, bar, mat), -w/2+c*sp, 0, 0));
            for (var r = 0; r <= Math.floor(h/sp); r++)
                g.add(pos(box(w, bar, bar, mat), 0, -h/2+r*sp, 0));
            return g;
        }

        // ═══════════════════════════════════════
        // BUILD THE TEMPLE
        // ═══════════════════════════════════════
        var temple = new THREE.Group();

        // Ground
        var ground = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), M.grass);
        ground.rotation.x = -Math.PI/2;
        ground.position.y = -0.02;
        ground.receiveShadow = true;
        scene.add(ground);

        // Stone Path
        var pathMesh = new THREE.Mesh(new THREE.PlaneGeometry(2.8, 22), M.path);
        pathMesh.rotation.x = -Math.PI/2;
        pathMesh.position.set(0, 0.005, 12);
        pathMesh.receiveShadow = true;
        scene.add(pathMesh);

        // Path border stones
        for (var i = -10; i < 10; i++) {
            var z = i*1.15 + 2;
            [-1.6, 1.6].forEach(function(x) {
                var s = addSh(box(0.35, 0.1, 0.55, M.stoneDark));
                s.position.set(x, 0.05, z);
                scene.add(s);
            });
        }

        // Platform - 3 tiers
        var tiers = [
            {w:15, d:11, h:0.35, y:0},
            {w:14, d:10.5, h:0.35, y:0.35},
            {w:13.5, d:10, h:0.35, y:0.7}
        ];
        tiers.forEach(function(t) {
            var p = addSh(box(t.w, t.h, t.d, M.stone));
            p.position.set(0, t.y+t.h/2, 0);
            p.receiveShadow = true;
            temple.add(p);
            var edge = box(t.w+0.15, 0.06, t.d+0.15, M.stoneLight);
            edge.position.set(0, t.y+t.h+0.03, 0);
            temple.add(edge);
        });

        var platH = 1.05;

        // Steps
        for (var i = 0; i < 4; i++) {
            var step = addSh(box(3.2, 0.26, 0.45, M.stone));
            step.position.set(0, platH - i*0.26 + 0.13, 5 + 0.22 + i*0.45);
            step.receiveShadow = true;
            temple.add(step);
        }

        // Step side walls
        [-1,1].forEach(function(side) {
            var wallGeo = new THREE.BufferGeometry();
            var hw = 1.75;
            var verts = new Float32Array([
                side*hw, platH, 5,
                side*hw, 0, 5+4*0.45,
                side*(hw+0.4), 0, 5+4*0.45,
                side*(hw+0.4), platH, 5,
            ]);
            wallGeo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
            wallGeo.setIndex([0,1,2, 0,2,3]);
            wallGeo.computeVertexNormals();
            temple.add(addSh(new THREE.Mesh(wallGeo, M.stone)));
        });

        // Platform railing
        for (var i = -5; i <= 5; i++) {
            if (Math.abs(i) < 2) continue;
            var post = addSh(cyl(0.06, 0.06, 0.6, 6, M.stoneLight));
            post.position.set(i*1.2, platH+0.3, 5.1);
            temple.add(post);
            var rail = box(1.2, 0.08, 0.06, M.stoneLight);
            rail.position.set(i*1.2+0.6, platH+0.55, 5.1);
            temple.add(rail);
        }

        // Pillars
        var pillarH = 5.2, pillarR = 0.2;
        var pillarPos = [
            [-5,0,-4],[5,0,-4],[-5,0,4],[5,0,4],
            [-1.7,0,-4],[1.7,0,-4],[-1.7,0,4],[1.7,0,4]
        ];

        pillarPos.forEach(function(pp) {
            var x = pp[0], z = pp[2];
            // Stone base
            temple.add(pos(addSh(cyl(pillarR*1.6, pillarR*1.8, 0.12, 12, M.stone)), x, platH+0.06, z));
            temple.add(pos(addSh(cyl(pillarR*1.3, pillarR*1.5, 0.08, 12, M.stoneLight)), x, platH+0.16, z));
            // Pillar
            temple.add(pos(addSh(cyl(pillarR, pillarR*1.05, pillarH, 16, M.red)), x, platH+0.2+pillarH/2, z));
            // Capital
            temple.add(pos(addSh(cyl(pillarR*1.2, pillarR*1.05, 0.12, 12, M.gold)), x, platH+0.2+pillarH, z));
            // Dougong
            var dg = createDougong(0.8);
            dg.position.set(x, platH+0.2+pillarH+0.12, z);
            temple.add(dg);
        });

        // Walls
        temple.add(pos(addSh(box(10.5, pillarH-0.3, 0.2, M.white)), 0, platH+0.2+(pillarH-0.3)/2, -4));
        [-1,1].forEach(function(side) {
            temple.add(pos(addSh(box(0.2, pillarH-0.3, 8, M.white)), side*6, platH+0.2+(pillarH-0.3)/2, 0));
        });

        // Windows
        [-1,1].forEach(function(side) {
            [-2, 0, 2].forEach(function(zOff) {
                var win = createWindow(1.2, 1.6);
                win.position.set(side*6.12, platH+0.2+pillarH*0.5, zOff);
                win.rotation.y = side * Math.PI/2;
                temple.add(win);
            });
        });

        // Front beam (额枋)
        temple.add(pos(addSh(box(10.8, 0.35, 0.25, M.redDark)), 0, platH+0.2+pillarH-0.15, 4.1));
        // Side beams
        [-1,1].forEach(function(side) {
            temple.add(pos(addSh(box(0.25, 0.35, 8.2, M.redDark)), side*6.1, platH+0.2+pillarH-0.15, 0));
        });

        // Roof
        var roofGeo = createRoof(6.5, 5.5, 3.5, 1.8, 1.2);
        var roofMesh = addSh(new THREE.Mesh(roofGeo, M.roof));
        roofMesh.position.y = platH + 0.2 + pillarH + 0.4;
        temple.add(roofMesh);

        // Ridge decorations (鸱吻)
        [-1,1].forEach(function(side) {
            var chiwen = addSh(cone(0.25, 0.6, 6, M.gold));
            chiwen.position.set(side*6.5, platH+0.2+pillarH+0.4+3.2, 0);
            chiwen.rotation.z = side * -0.4;
            temple.add(chiwen);
        });

        // Ridge line
        temple.add(pos(addSh(box(0.12, 0.15, 11.5, M.gold)), 0, platH+0.2+pillarH+0.4+3.4, 0));

        // Doors
        [-1.5, 1.5].forEach(function(xOff) {
            // Door frame
            temple.add(pos(box(0.12, 3.8, 0.15, M.redDark), xOff-0.7, platH+0.2+1.9, 4.15));
            temple.add(pos(box(0.12, 3.8, 0.15, M.redDark), xOff+0.7, platH+0.2+1.9, 4.15));
            temple.add(pos(box(1.52, 0.12, 0.15, M.redDark), xOff, platH+0.2+3.85, 4.15));
            // Door panels
            [-1,1].forEach(function(side) {
                var door = addSh(box(0.65, 3.6, 0.08, M.wood));
                door.position.set(xOff + side*0.35, platH+0.2+1.8, 4.18);
                temple.add(door);
                // Door studs (门钉)
                for (var row = 0; row < 5; row++) {
                    for (var col = 0; col < 3; col++) {
                        var stud = sph(0.03, 6, M.gold);
                        stud.position.set(xOff + side*0.35 + (col-1)*0.15, platH+0.2+0.6+row*0.6, 4.23);
                        temple.add(stud);
                    }
                }
                // Door ring (门环)
                var ring = torus(0.08, 0.015, 8, M.gold);
                ring.position.set(xOff + side*0.35, platH+0.2+1.8, 4.25);
                temple.add(ring);
            });
        });

        // Door threshold (门槛)
        temple.add(pos(addSh(box(3.2, 0.12, 0.2, M.stone)), 0, platH+0.2+0.06, 4.2));

        // Couplets - RIGHT side: 广堡深恩似海长
        var rightCouplet = createCouplet('广堡深恩似海长');
        rightCouplet.position.set(6.5, platH+0.2, 2.5);
        rightCouplet.rotation.y = -Math.PI/2;
        temple.add(rightCouplet);

        // Couplets - LEFT side: 侃君厚德如山重
        var leftCouplet = createCouplet('侃君厚德如山重');
        leftCouplet.position.set(-6.5, platH+0.2, 2.5);
        leftCouplet.rotation.y = Math.PI/2;
        temple.add(leftCouplet);

        // Plaque (匾额)
        var plaque = createPlaque('永怀堂');
        plaque.position.set(0, platH+0.2+pillarH-0.6, 4.25);
        temple.add(plaque);

        // Horizontal scroll (横批)
        var hscroll = createHScroll('祖德流芳');
        hscroll.position.set(0, platH+0.2+pillarH+0.15, 4.25);
        temple.add(hscroll);

        // Interior - altar table
        temple.add(pos(addSh(box(2.5, 0.08, 0.8, M.wood)), 0, platH+0.2+1.5, -3.5));
        temple.add(pos(addSh(box(0.08, 1.4, 0.6, M.wood)), -1.2, platH+0.2+0.7, -3.5));
        temple.add(pos(addSh(box(0.08, 1.4, 0.6, M.wood)), 1.2, platH+0.2+0.7, -3.5));

        // Spirit tablet (牌位)
        temple.add(pos(addSh(box(0.5, 1.2, 0.08, M.woodDark)), 0, platH+0.2+2.1, -3.4));
        var tabletTex = createTextTex('先父', {fontSize:60, color:'#FFD700', bgColor:'#3a1a08', width:100, height:200, vertical:true});
        var tabletMat = new THREE.MeshBasicMaterial({map:tabletTex, transparent:true});
        var tabletPlane = new THREE.Mesh(new THREE.PlaneGeometry(0.4, 1.0), tabletMat);
        tabletPlane.position.set(0, platH+0.2+2.1, -3.35);
        temple.add(tabletPlane);

        // Candles
        var candleLights = [];
        [-0.8, 0.8].forEach(function(xOff) {
            temple.add(pos(addSh(cyl(0.04, 0.04, 0.5, 8, M.candle)), xOff, platH+0.2+1.8, -3.2));
            var flame = new THREE.Mesh(new THREE.SphereGeometry(0.04, 6, 6), M.flame);
            flame.position.set(xOff, platH+0.2+2.1, -3.2);
            temple.add(flame);
            var cl = new THREE.PointLight(0xff8833, 0.4, 4);
            cl.position.set(xOff, platH+0.2+2.1, -3.2);
            temple.add(cl);
            candleLights.push(cl);
        });

        // Incense burner in front
        var burner = createBurner();
        burner.position.set(0, platH, 3);
        temple.add(burner);

        // Smoke
        var smoke = createSmoke();
        smoke.position.set(0, platH+0.85, 3);
        temple.add(smoke);

        scene.add(temple);

        // ═══ TREES ═══
        // Loquat trees (枇杷树)
        [[-9, 0, -3, 1.1], [8, 0, -2, 1.0], [-8, 0, 6, 0.9]].forEach(function(p) {
            var t = createLoquatTree(p[3]);
            t.position.set(p[0], p[1], p[2]);
            scene.add(t);
        });

        // Pomelo trees (柚子树)
        [[9, 0, 3, 1.0], [-10, 0, 2, 1.1], [7, 0, -6, 0.95]].forEach(function(p) {
            var t = createPomeloTree(p[3]);
            t.position.set(p[0], p[1], p[2]);
            scene.add(t);
        });

        // Pine trees (松树)
        [[-11, 0, -6, 1.2], [11, 0, -5, 1.1], [-12, 0, 5, 1.0]].forEach(function(p) {
            var t = createPineTree(p[3]);
            t.position.set(p[0], p[1], p[2]);
            scene.add(t);
        });

        // Cypress trees (柏树)
        [[-7, 0, -7, 1.0], [7, 0, -7, 1.0], [-7, 0, 8, 0.9], [7, 0, 8, 0.9]].forEach(function(p) {
            var t = createCypressTree(p[3]);
            t.position.set(p[0], p[1], p[2]);
            scene.add(t);
        });

        // Bamboo clusters (竹丛)
        [[-4, 0, 8, 0.8], [5, 0, 9, 0.7], [-10, 0, -1, 0.75]].forEach(function(p) {
            var t = createBambooCluster(p[3]);
            t.position.set(p[0], p[1], p[2]);
            scene.add(t);
        });

        // Osmanthus trees (桂花树)
        [[-3, 0, -8, 0.9], [4, 0, -8, 0.85]].forEach(function(p) {
            var t = createOsmanthusTree(p[3]);
            t.position.set(p[0], p[1], p[2]);
            scene.add(t);
        });

        // Stone lanterns
        [[-2, 0, 7, 1.0], [2, 0, 7, 1.0], [-2, 0, 2, 0.8], [2, 0, 2, 0.8]].forEach(function(p) {
            var l = createLantern(p[3]);
            l.position.set(p[0], p[1], p[2]);
            scene.add(l);
        });

        // ═══ ANIMATION ═══
        var autoRotate = true;
        var clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            var t = clock.getElapsedTime();

            controls.autoRotate = autoRotate;
            controls.autoRotateSpeed = 0.8;
            controls.update();

            // Flickering lights
            var lanterns = scene.children.filter(function(c) { return c.isGroup && c.children.length > 8; });
            candleLights.forEach(function(l, i) {
                l.intensity = 0.3 + Math.sin(t*7+i*2)*0.08 + Math.sin(t*11+i)*0.04;
            });
            interiorGlow.intensity = 0.55 + Math.sin(t*4)*0.08;

            // Smoke animation
            if (smokePts) {
                var posArr = smokePts.geometry.attributes.position.array;
                var vels = smokePts.userData.vels;
                for (var i = 0; i < vels.length; i++) {
                    posArr[i*3] += vels[i].x + Math.sin(t+i)*0.001;
                    posArr[i*3+1] += vels[i].y;
                    posArr[i*3+2] += vels[i].z + Math.cos(t+i)*0.001;
                    if (posArr[i*3+1] > 3.5) {
                        posArr[i*3] = (Math.random()-0.5)*0.25;
                        posArr[i*3+1] = 0;
                        posArr[i*3+2] = (Math.random()-0.5)*0.25;
                    }
                }
                smokePts.geometry.attributes.position.needsUpdate = true;
            }

            renderer.render(scene, camera);
        }

        // Loading
        var loadBar = document.getElementById('load-bar');
        var prog = 0;
        var li = setInterval(function() {
            prog += Math.random()*18 + 4;
            if (prog >= 100) {
                prog = 100;
                loadBar.style.width = '100%';
                clearInterval(li);
                setTimeout(function() {
                    document.getElementById('loading').classList.add('done');
                    setTimeout(function() {
                        document.getElementById('loading').style.display = 'none';
                    }, 1000);
                }, 300);
            } else {
                loadBar.style.width = prog + '%';
            }
        }, 80);

        animate();

        addEventListener('resize', function() {
            camera.aspect = innerWidth/innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });

        window.resetCamera = function() {
            controls.target.set(0, 3.8, 0);
            camera.position.set(0, 9, 24);
            controls.update();
        };
        window.toggleAutoRotate = function() { autoRotate = !autoRotate; };
        window.toggleInfo = function() { document.getElementById('info-panel').classList.toggle('show'); };

    })();
    }
    </script>
</body>
</html>
