<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>永怀堂 - 纪念寺庙</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;background:#1a1a2e;font-family:'KaiTi','STKaiti','PingFang SC',serif}
        canvas{display:block;touch-action:none}
        #loading{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity 1s}
        #loading.done{opacity:0;pointer-events:none}
        #loading h2{color:#FFD700;font-size:2em;letter-spacing:.6em;margin-bottom:8px}
        #loading p{color:rgba(255,215,0,.5);font-size:.85em;letter-spacing:.3em;margin-bottom:24px}
        #loading .bar{width:180px;height:2px;background:rgba(255,215,0,.15);border-radius:1px;overflow:hidden}
        #loading .bar-fill{width:0%;height:100%;background:linear-gradient(90deg,#FFD700,#FFA500);transition:width .3s}
        #loading .err{color:#ff6b6b;font-size:.8em;margin-top:16px;display:none;text-align:center;padding:0 20px}
        #overlay{position:fixed;top:0;left:0;width:100%;pointer-events:none;z-index:10;text-align:center;padding:18px}
        #overlay h1{color:#FFD700;font-size:1.5em;letter-spacing:.5em;text-shadow:0 2px 12px rgba(0,0,0,.7),0 0 30px rgba(255,215,0,.15)}
        #overlay p{color:rgba(255,255,255,.4);font-size:.75em;letter-spacing:.2em;margin-top:4px}
        #info-panel{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);color:rgba(255,255,255,.7);padding:10px 18px;border-radius:8px;font-size:.75em;letter-spacing:.1em;pointer-events:none;opacity:0;transition:opacity .3s;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);max-width:90vw;text-align:center}
        #info-panel.show{opacity:1}
        #controls{position:fixed;bottom:16px;right:16px;display:flex;flex-direction:column;gap:8px;z-index:20}
        #controls button{width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,215,0,.3);background:rgba(0,0,0,.4);color:#FFD700;font-size:16px;cursor:pointer;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center}
        #controls button:active{background:rgba(255,215,0,.2)}
    </style>
</head>
<body>
    <div id="loading">
        <h2>永怀堂</h2>
        <p>纪念寺庙</p>
        <div class="bar"><div class="bar-fill" id="load-bar"></div></div>
        <div class="err" id="load-err">加载失败，请刷新页面重试</div>
    </div>
    <div id="overlay">
        <h1>永怀堂</h1>
        <p>缅怀先父 · 德泽长存</p>
    </div>
    <div id="info-panel">手指拖动旋转 · 双指缩放 · 底部按钮控制</div>
    <div id="controls">
        <button onclick="resetCamera()" title="重置视角">⟲</button>
        <button onclick="toggleAutoRotate()" title="自动旋转">↻</button>
        <button onclick="toggleInfo()" title="操作说明">i</button>
    </div>

    <script>
    // CDN fallback chain
    var cdnUrls = [
        'https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js',
        'https://unpkg.com/three@0.157.0/build/three.min.js',
        'https://cdnjs.cloudflare.com/ajax/libs/three.js/0.157.0/three.min.js'
    ];
    var orbUrls = [
        'https://cdn.jsdelivr.net/npm/three@0.157.0/examples/js/controls/OrbitControls.js',
        'https://unpkg.com/three@0.157.0/examples/js/controls/OrbitControls.js',
        'https://cdnjs.cloudflare.com/ajax/libs/three.js/0.157.0/examples/js/controls/OrbitControls.js'
    ];

    function loadScript(urls, cb) {
        var i = 0;
        function tryNext() {
            if (i >= urls.length) { document.getElementById('load-err').style.display='block'; return; }
            var s = document.createElement('script');
            s.src = urls[i]; s.onerror = function() { i++; tryNext(); };
            s.onload = cb;
            document.head.appendChild(s);
        }
        tryNext();
    }

    loadScript(cdnUrls, function() {
        loadScript(orbUrls, function() {
            initScene();
        });
    });

    function initScene() {
    (function() {
        // ═══ SETUP ═══
        var scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x8899aa, 0.012);

        var camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 200);
        camera.position.set(0, 8, 22);

        var renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.1;
        document.body.appendChild(renderer.domElement);

        var controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 3.5, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.minDistance = 5;
        controls.maxDistance = 40;
        controls.maxPolarAngle = Math.PI * 0.48;
        controls.update();

        // ═══ LIGHTING ═══
        scene.add(new THREE.AmbientLight(0x667788, 0.6));
        scene.add(new THREE.HemisphereLight(0x88aacc, 0x445533, 0.5));

        var sun = new THREE.DirectionalLight(0xffeedd, 1.2);
        sun.position.set(8, 15, 10);
        sun.castShadow = true;
        sun.shadow.mapSize.set(2048, 2048);
        sun.shadow.camera.near = 0.5;
        sun.shadow.camera.far = 50;
        sun.shadow.camera.left = -20;
        sun.shadow.camera.right = 20;
        sun.shadow.camera.top = 20;
        sun.shadow.camera.bottom = -20;
        sun.shadow.bias = -0.001;
        scene.add(sun);

        var fill = new THREE.DirectionalLight(0xaabbcc, 0.3);
        fill.position.set(-5, 8, -5);
        scene.add(fill);

        // Sky dome
        var skyGeo = new THREE.SphereGeometry(80, 32, 16);
        var skyMat = new THREE.ShaderMaterial({
            side: THREE.BackSide,
            uniforms: {},
            vertexShader: 'varying vec3 vPos;void main(){vPos=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}',
            fragmentShader: 'varying vec3 vPos;void main(){float h=normalize(vPos).y;vec3 top=vec3(0.4,0.55,0.75);vec3 mid=vec3(0.65,0.75,0.85);vec3 bot=vec3(0.8,0.82,0.78);vec3 c=mix(bot,mid,smoothstep(0.0,0.3,h));c=mix(c,top,smoothstep(0.3,0.8,h));gl_FragColor=vec4(c,1.0);}'
        });
        scene.add(new THREE.Mesh(skyGeo, skyMat));

        // ═══ MATERIALS ═══
        function tex(w, h, fn) {
            var c = document.createElement('canvas');
            c.width = w; c.height = h;
            var ctx = c.getContext('2d');
            fn(ctx, w, h);
            var t = new THREE.CanvasTexture(c);
            t.wrapS = t.wrapT = THREE.RepeatWrapping;
            return t;
        }

        // Stone texture
        var stoneTex = tex(256, 256, function(ctx, w, h) {
            ctx.fillStyle = '#8a8278';
            ctx.fillRect(0, 0, w, h);
            for (var i = 0; i < 800; i++) {
                ctx.fillStyle = 'rgba(' + (100+Math.random()*40) + ',' + (95+Math.random()*35) + ',' + (85+Math.random()*30) + ',0.3)';
                ctx.fillRect(Math.random()*w, Math.random()*h, 1+Math.random()*3, 1+Math.random()*3);
            }
            // Subtle cracks
            ctx.strokeStyle = 'rgba(60,55,50,0.15)';
            ctx.lineWidth = 0.5;
            for (var i = 0; i < 5; i++) {
                ctx.beginPath();
                var sx = Math.random()*w, sy = Math.random()*h;
                ctx.moveTo(sx, sy);
                for (var j = 0; j < 4; j++) {
                    sx += (Math.random()-0.5)*30;
                    sy += (Math.random()-0.5)*30;
                    ctx.lineTo(sx, sy);
                }
                ctx.stroke();
            }
        });

        var M = {
            stone: new THREE.MeshStandardMaterial({ map: stoneTex, color: 0x9a9288, roughness: 0.85, metalness: 0.05 }),
            stoneL: new THREE.MeshStandardMaterial({ color: 0xa8a090, roughness: 0.8 }),
            red: new THREE.MeshStandardMaterial({ color: 0x8B1A1A, roughness: 0.4, metalness: 0.1 }),
            redD: new THREE.MeshStandardMaterial({ color: 0x6B0F0F, roughness: 0.5 }),
            white: new THREE.MeshStandardMaterial({ color: 0xF5F0E8, roughness: 0.7 }),
            gold: new THREE.MeshStandardMaterial({ color: 0xDAA520, roughness: 0.3, metalness: 0.6 }),
            wood: new THREE.MeshStandardMaterial({ color: 0x5C3317, roughness: 0.6 }),
            woodD: new THREE.MeshStandardMaterial({ color: 0x3E1F0D, roughness: 0.7 }),
            grass: new THREE.MeshStandardMaterial({ color: 0x4A7A3A, roughness: 0.95 }),
            path: new THREE.MeshStandardMaterial({ color: 0x7A7568, roughness: 0.9 }),
            trunk: new THREE.MeshStandardMaterial({ color: 0x5C4033, roughness: 0.9 }),
            trunkD: new THREE.MeshStandardMaterial({ color: 0x4A3328, roughness: 0.9 }),
            leafLoq: new THREE.MeshStandardMaterial({ color: 0x2D5A1E, roughness: 0.8 }),
            leafPom: new THREE.MeshStandardMaterial({ color: 0x3A6B2A, roughness: 0.8 }),
            leafD: new THREE.MeshStandardMaterial({ color: 0x1A4A12, roughness: 0.85 }),
            leafM: new THREE.MeshStandardMaterial({ color: 0x2A5A20, roughness: 0.8 }),
            leafL: new THREE.MeshStandardMaterial({ color: 0x4A8A3A, roughness: 0.7, side: THREE.DoubleSide }),
            bamboo: new THREE.MeshStandardMaterial({ color: 0x5A8A3A, roughness: 0.6 }),
            bambooJ: new THREE.MeshStandardMaterial({ color: 0x4A7A2A, roughness: 0.7 }),
            roofTile: new THREE.MeshStandardMaterial({ color: 0x4A4A4A, roughness: 0.7, metalness: 0.1 }),
            roofDark: new THREE.MeshStandardMaterial({ color: 0x3A3A3A, roughness: 0.75 }),
        };

        // ═══ HELPERS ═══
        function B(w,h,d,m){return new THREE.BoxGeometry(w,h,d)}
        function C(rt,rb,h,seg,m){return new THREE.CylinderGeometry(rt,rb,h,seg||8)}
        function S(r,seg,m){return new THREE.SphereGeometry(r,seg||8,seg||8)}
        function Co(rt,rb,seg,m){return new THREE.ConeGeometry(rt,rb,seg||8)}
        function T(rt,rb,seg,m){return new THREE.TorusGeometry(rt,rb,seg||8,16)}
        function P(g,x,y,z){var o=new THREE.Mesh(g,arguments.length>4?arguments[4]:undefined);o.position.set(x,y,z);return o}
        function sh(m){m.castShadow=true;m.receiveShadow=true;return m}

        // ═══ TEXT SPRITE ═══
        function mkTextSprite(text, fontSize, color, bgColor) {
            var c = document.createElement('canvas');
            c.width = 256; c.height = 1024;
            var ctx = c.getContext('2d');
            if (bgColor) {
                ctx.fillStyle = bgColor;
                ctx.fillRect(0, 0, 256, 1024);
                // Border
                ctx.strokeStyle = '#DAA520';
                ctx.lineWidth = 6;
                ctx.strokeRect(8, 8, 240, 1008);
                ctx.strokeStyle = '#8B6914';
                ctx.lineWidth = 2;
                ctx.strokeRect(14, 14, 228, 996);
            }
            ctx.fillStyle = color || '#FFD700';
            ctx.font = 'bold ' + (fontSize || 72) + 'px KaiTi, STKaiti, SimSun, serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            var chars = text.split('');
            var lineH = fontSize * 1.4;
            var startY = (1024 - chars.length * lineH) / 2 + lineH / 2;
            chars.forEach(function(ch, i) {
                ctx.fillText(ch, 128, startY + i * lineH);
            });
            var tex = new THREE.CanvasTexture(c);
            var mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
            var sprite = new THREE.Sprite(mat);
            sprite.scale.set(1.2, 4.8, 1);
            return sprite;
        }

        function mkPlaque(text) {
            var c = document.createElement('canvas');
            c.width = 512; c.height = 128;
            var ctx = c.getContext('2d');
            ctx.fillStyle = '#2A0A0A';
            ctx.fillRect(0, 0, 512, 128);
            ctx.strokeStyle = '#DAA520';
            ctx.lineWidth = 4;
            ctx.strokeRect(6, 6, 500, 116);
            ctx.strokeStyle = '#8B6914';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(12, 12, 488, 104);
            ctx.fillStyle = '#FFD700';
            ctx.font = 'bold 64px KaiTi, STKaiti, SimSun, serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, 256, 68);
            var tex = new THREE.CanvasTexture(c);
            var mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
            var sprite = new THREE.Sprite(mat);
            sprite.scale.set(4, 1, 1);
            return sprite;
        }

        function mkHScroll(text) {
            var c = document.createElement('canvas');
            c.width = 512; c.height = 80;
            var ctx = c.getContext('2d');
            ctx.fillStyle = '#3A1515';
            ctx.fillRect(0, 0, 512, 80);
            ctx.strokeStyle = '#DAA520';
            ctx.lineWidth = 3;
            ctx.strokeRect(4, 4, 504, 72);
            ctx.fillStyle = '#FFD700';
            ctx.font = 'bold 40px KaiTi, STKaiti, SimSun, serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, 256, 44);
            var tex = new THREE.CanvasTexture(c);
            var mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
            var sprite = new THREE.Sprite(mat);
            sprite.scale.set(3.5, 0.55, 1);
            return sprite;
        }

        function mkCouplet(text) {
            return mkTextSprite(text, 68, '#FFD700', '#2A0A0A');
        }

        // ═══ ROOF BUILDER ═══
        function buildRoof(halfW, halfD, peakH, eaveH) {
            var g = new THREE.Group();
            var w = halfW, d = halfD;

            // Main roof surface - custom geometry
            var seg = 32;
            var verts = [], uvs = [], idx = [];

            for (var iz = 0; iz <= seg; iz++) {
                for (var ix = 0; ix <= seg; ix++) {
                    var u = ix / seg, v = iz / seg;
                    var x = -w + u * 2 * w;
                    var z = -d + v * 2 * d;
                    var nx = x / w;
                    var nz = z / d;
                    var absZ = Math.abs(nz);
                    var absX = Math.abs(nx);

                    // Hip factor: corners drop more
                    var hipFactor = 1.0 - absX * 0.35;
                    if (hipFactor < 0.15) hipFactor = 0.15;
                    var slopeZ = absZ / hipFactor;
                    if (slopeZ > 1.0) slopeZ = 1.0;

                    // Height: peak at center, drops to eave
                    var y = peakH * (1.0 - slopeZ);

                    // Gentle concave curve (落膛)
                    y += peakH * 0.06 * Math.sin(slopeZ * Math.PI);

                    // Very subtle eave upturn at the very tips only
                    var edgeDist = Math.sqrt(nx * nx + nz * nz);
                    if (edgeDist > 0.93) {
                        var t = (edgeDist - 0.93) / 0.07;
                        y += 0.1 * t * t;
                    }

                    // Ridge arch
                    if (absZ < 0.12) {
                        var ridgeT = absZ / 0.12;
                        y += peakH * 0.03 * (1.0 - ridgeT * ridgeT);
                    }

                    verts.push(x, y, z);
                    uvs.push(u, v);
                }
            }

            for (var iz = 0; iz < seg; iz++) {
                for (var ix = 0; ix < seg; ix++) {
                    var a = iz * (seg + 1) + ix;
                    var b = a + 1;
                    var c = a + (seg + 1);
                    var dd = c + 1;
                    idx.push(a, c, b, b, c, dd);
                }
            }

            var roofGeo = new THREE.BufferGeometry();
            roofGeo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
            roofGeo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
            roofGeo.setIndex(idx);
            roofGeo.computeVertexNormals();
            g.add(sh(new THREE.Mesh(roofGeo, M.roofTile)));

            // Roof underside (ceiling)
            var underGeo = roofGeo.clone();
            var underMesh = new THREE.Mesh(underGeo, M.roofDark);
            underMesh.rotation.x = Math.PI;
            underMesh.position.y = -0.15;
            g.add(underMesh);

            // Ridge beam (正脊)
            var ridgeLen = w * 0.85;
            g.add(P(sh(B(ridgeLen, 0.2, 0.18, M.roofDark)), 0, peakH + 0.12, 0));
            // Ridge end ornaments (鸱吻)
            [-1, 1].forEach(function(side) {
                var chi = new THREE.Group();
                chi.add(P(sh(Co(0.15, 0.35, 6, M.roofDark)), 0, 0.2, 0));
                var tail = sh(Co(0.08, 0.25, 6, M.gold));
                tail.position.set(0, 0.12, -side * 0.15);
                tail.rotation.z = -side * 0.7;
                chi.add(tail);
                chi.position.set(side * ridgeLen, peakH + 0.1, 0);
                chi.rotation.y = side > 0 ? 0 : Math.PI;
                g.add(chi);
            });

            // Eave trim lines (瓦当滴水)
            function makeEaveEdge(sideAxis, sideVal, length, alongAxis) {
                var edgeGeo = new THREE.BufferGeometry();
                var ev = [], ei = [];
                var eSeg = 48;
                for (var i = 0; i <= eSeg; i++) {
                    var u = i / eSeg;
                    var pos1, pos2;
                    if (alongAxis === 'x') {
                        var x = -length + u * 2 * length;
                        var nx = x / w;
                        var absX = Math.abs(nx);
                        var hipF = 1.0 - absX * 0.35;
                        if (hipF < 0.15) hipF = 0.15;
                        var slopeZ = 1.0 / hipF;
                        if (slopeZ > 1.0) slopeZ = 1.0;
                        var y = peakH * (1.0 - slopeZ);
                        y += peakH * 0.06 * Math.sin(slopeZ * Math.PI);
                        var edgeDist = Math.abs(nx);
                        if (edgeDist > 0.93) {
                            var t = (edgeDist - 0.93) / 0.07;
                            y += 0.1 * t * t;
                        }
                        if (sideAxis === 'z') {
                            pos1 = [x, y, sideVal];
                            pos2 = [x, y - 0.1, sideVal];
                        } else {
                            pos1 = [sideVal, y, x];
                            pos2 = [sideVal, y - 0.1, x];
                        }
                    } else {
                        var z = -length + u * 2 * length;
                        var nz = z / d;
                        var absZ = Math.abs(nz);
                        var hipF = 1.0 - 0.35; // at x=±w, absX=1
                        hipF = 0.65;
                        var slopeZ = absZ / hipF;
                        if (slopeZ > 1.0) slopeZ = 1.0;
                        var y = peakH * (1.0 - slopeZ);
                        y += peakH * 0.06 * Math.sin(slopeZ * Math.PI);
                        var edgeDist = Math.sqrt(1.0 + nz * nz);
                        if (edgeDist > 0.93) {
                            var t = (edgeDist - 0.93) / 0.07;
                            y += 0.1 * t * t;
                        }
                        pos1 = [sideVal, y, z];
                        pos2 = [sideVal, y - 0.1, z];
                    }
                    ev.push(pos1[0], pos1[1], pos1[2]);
                    ev.push(pos2[0], pos2[1], pos2[2]);
                }
                for (var i = 0; i < eSeg; i++) {
                    var a = i * 2, b = a + 1, c = a + 2, dd = a + 3;
                    ei.push(a, c, b, b, c, dd);
                }
                edgeGeo.setAttribute('position', new THREE.Float32BufferAttribute(ev, 3));
                edgeGeo.setIndex(ei);
                edgeGeo.computeVertexNormals();
                g.add(sh(new THREE.Mesh(edgeGeo, M.gold)));
            }

            // Front and back eave edges
            makeEaveEdge('z', d, w, 'x');
            makeEaveEdge('z', -d, w, 'x');
            // Side eave edges
            makeEaveEdge('x', w, d, 'z');
            makeEaveEdge('x', -w, d, 'z');

            return g;
        }

        // Dougong
        function mkDougong(s) {
            var g = new THREE.Group(), m = M.redD;
            g.add(P(B(0.5*s, 0.12*s, 0.5*s, m), 0, 0.06*s, 0));
            g.add(P(B(0.7*s, 0.08*s, 0.15*s, m), 0, 0.16*s, 0));
            g.add(P(B(0.15*s, 0.08*s, 0.7*s, m), 0, 0.16*s, 0));
            g.add(P(B(0.9*s, 0.08*s, 0.15*s, m), 0, 0.24*s, 0));
            g.add(P(B(0.15*s, 0.08*s, 0.9*s, m), 0, 0.24*s, 0));
            g.add(P(B(0.6*s, 0.1*s, 0.6*s, m), 0, 0.33*s, 0));
            return g;
        }

        // Window lattice
        function mkWindow(w, h) {
            var g = new THREE.Group(), m = M.woodD, bar = 0.03;
            g.add(P(B(w+bar*2, bar, bar, m), 0, h/2, 0));
            g.add(P(B(w+bar*2, bar, bar, m), 0, -h/2, 0));
            g.add(P(B(bar, h, bar, m), -w/2, 0, 0));
            g.add(P(B(bar, h, bar, m), w/2, 0, 0));
            var sp = 0.18;
            for (var c = 0; c <= Math.floor(w/sp); c++) g.add(P(B(bar, h, bar, m), -w/2+c*sp, 0, 0));
            for (var r = 0; r <= Math.floor(h/sp); r++) g.add(P(B(w, bar, bar, m), 0, -h/2+r*sp, 0));
            return g;
        }

        // Trees
        function mkLoquat(s) {
            s=s||1;var g=new THREE.Group();
            g.add(P(sh(C(0.1*s,0.2*s,2.8*s,8,M.trunk)),0,1.4*s,0));
            [[0,3.4,0,1.6],[-0.9,3.0,0.5,1.2],[0.8,3.1,-0.4,1.3],[0,4.0,0.2,1.1],[-0.5,3.6,-0.5,1.0],[0.4,2.8,0.6,1.1],[-0.3,3.2,-0.2,1.4],[0.6,3.5,0.3,1.0],[0.1,3.8,-0.4,0.9],[-0.7,3.4,0.1,1.1]].forEach(function(p){var sp=sh(S(p[3]*s,7,M.leafLoq));sp.position.set(p[0]*s,p[1]*s,p[2]*s);sp.scale.y=0.7+Math.random()*0.3;g.add(sp)});
            return g;
        }
        function mkPomelo(s) {
            s=s||1;var g=new THREE.Group();
            g.add(P(sh(C(0.09*s,0.18*s,3.0*s,8,M.trunk)),0,1.5*s,0));
            [[0,3.6,0,1.7],[-0.7,3.3,0.3,1.3],[0.6,3.4,-0.3,1.4],[0,4.2,0,1.2],[-0.4,3.8,-0.4,1.1],[0.3,3.1,0.5,1.2],[0.5,3.7,0.2,1.0],[-0.6,3.5,-0.1,1.1]].forEach(function(p){var sp=sh(S(p[3]*s,7,M.leafPom));sp.position.set(p[0]*s,p[1]*s,p[2]*s);sp.scale.y=0.75+Math.random()*0.25;g.add(sp)});
            return g;
        }
        function mkPine(s) {
            s=s||1;var g=new THREE.Group();
            g.add(P(sh(C(0.07*s,0.16*s,3.2*s,8,M.trunkD)),0,1.6*s,0));
            [[0,2.8,0,1.6,1.4],[0,3.7,0,1.3,1.1],[0,4.4,0,0.9,1.0],[0,5.0,0,0.5,0.8]].forEach(function(p){g.add(P(sh(Co(p[3]*s,p[4]*s,8,M.leafD)),p[0]*s,p[1]*s,p[2]*s))});
            return g;
        }
        function mkCypress(s) {
            s=s||1;var g=new THREE.Group();
            g.add(P(sh(C(0.05*s,0.12*s,3.8*s,8,M.trunkD)),0,1.9*s,0));
            [[0,3.2,0,0.85,2.2],[0,4.5,0,0.65,1.6],[0,5.4,0,0.4,1.3],[0,6.1,0,0.2,1.0]].forEach(function(p){g.add(P(sh(Co(p[3]*s,p[4]*s,8,M.leafM)),p[0]*s,p[1]*s,p[2]*s))});
            return g;
        }
        function mkBamboo(s) {
            s=s||1;var g=new THREE.Group(),n=5+Math.floor(Math.random()*4);
            for(var i=0;i<n;i++){var sg=new THREE.Group(),h=(3+Math.random()*2.5)*s,r=(0.025+Math.random()*0.02)*s;
            sg.add(P(sh(C(r,r*1.15,h,6,M.bamboo)),0,h/2,0));
            var jc=Math.floor(h/(0.45*s));for(var j=1;j<jc;j++){var jnt=T(r*1.4,r*0.35,6,M.bambooJ);jnt.position.y=j*0.45*s;jnt.rotation.x=Math.PI/2;sg.add(jnt)}
            for(var l=0;l<4;l++){var leaf=new THREE.Mesh(new THREE.PlaneGeometry((0.3+Math.random()*0.2)*s,0.06*s),M.leafL);leaf.position.set((Math.random()-0.5)*0.3*s,h-Math.random()*0.8*s,(Math.random()-0.5)*0.3*s);leaf.rotation.set(Math.random()*0.5-0.25,Math.random()*Math.PI,Math.random()*0.3);sg.add(leaf)}
            sg.position.set((Math.random()-0.5)*0.7*s,0,(Math.random()-0.5)*0.7*s);g.add(sg)}
            return g;
        }
        function mkOsmanthus(s) {
            s=s||1;var g=new THREE.Group();
            g.add(P(sh(C(0.08*s,0.15*s,2.4*s,8,M.trunk)),0,1.2*s,0));
            [[0,3.0,0,1.5],[-0.8,2.7,0.4,1.2],[0.7,2.8,-0.3,1.3],[0,3.6,0.2,1.1],[-0.4,3.2,-0.3,1.2],[0.5,3.3,0.1,1.0]].forEach(function(p){var sp=sh(S(p[3]*s,7,M.leafM));sp.position.set(p[0]*s,p[1]*s,p[2]*s);sp.scale.y=0.7+Math.random()*0.3;g.add(sp)});
            return g;
        }

        // Stone lantern
        function mkLantern(s) {
            s=s||1;var g=new THREE.Group();
            g.add(P(C(0.35*s,0.4*s,0.12*s,6,M.stone),0,0.06*s,0));
            g.add(P(C(0.07*s,0.09*s,0.9*s,6,M.stone),0,0.57*s,0));
            g.add(P(C(0.28*s,0.25*s,0.06*s,6,M.stone),0,1.05*s,0));
            g.add(P(B(0.3*s,0.35*s,0.3*s,M.stone),0,1.25*s,0));
            var rm=Co(0.38*s,0.3*s,6,M.stoneL);rm.position.y=1.58*s;rm.rotation.y=Math.PI/6;g.add(rm);
            g.add(P(S(0.05*s,6,M.stone),0,1.78*s,0));
            g.add(P(C(0.03*s,0.03*s,0.12*s,6,M.stone),0,1.85*s,0));
            var glow=new THREE.PointLight(0xffaa44,0.25,3);glow.position.y=1.25*s;g.add(glow);
            return g;
        }

        // ═══════════════════════════════════════
        // BUILD TEMPLE
        // ═══════════════════════════════════════
        var temple = new THREE.Group();

        // Ground
        var ground = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), M.grass);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.02;
        ground.receiveShadow = true;
        scene.add(ground);

        // Stone path
        var pathM = new THREE.Mesh(new THREE.PlaneGeometry(2.8, 22), M.path);
        pathM.rotation.x = -Math.PI / 2;
        pathM.position.set(0, 0.005, 12);
        pathM.receiveShadow = true;
        scene.add(pathM);
        for (var i = -10; i < 10; i++) {
            var z = i * 1.15 + 2;
            [-1.6, 1.6].forEach(function(x) {
                var s = sh(B(0.35, 0.1, 0.55, M.stoneL));
                s.position.set(x, 0.05, z);
                scene.add(s);
            });
        }

        // ═══ PLATFORM ═══
        var tiers = [
            { w: 15, d: 11, h: 0.35, y: 0 },
            { w: 14, d: 10.5, h: 0.35, y: 0.35 },
            { w: 13.5, d: 10, h: 0.35, y: 0.7 }
        ];
        tiers.forEach(function(t) {
            var p = sh(B(t.w, t.h, t.d, M.stone));
            p.position.set(0, t.y + t.h / 2, 0);
            p.receiveShadow = true;
            temple.add(p);
            var edge = B(t.w + 0.15, 0.06, t.d + 0.15, M.stoneL);
            edge.position.set(0, t.y + t.h + 0.03, 0);
            temple.add(edge);
        });
        var platH = 1.05;

        // Steps
        for (var i = 0; i < 4; i++) {
            var step = sh(B(3.2, 0.26, 0.45, M.stone));
            step.position.set(0, platH - i * 0.26 + 0.13, 5 + 0.22 + i * 0.45);
            step.receiveShadow = true;
            temple.add(step);
        }
        // Step side walls
        [-1, 1].forEach(function(side) {
            var wg = new THREE.BufferGeometry(), hw = 1.75;
            wg.setAttribute('position', new THREE.Float32BufferAttribute([
                side*hw, platH, 5,
                side*hw, 0, 5+1.8,
                side*(hw+0.4), 0, 5+1.8,
                side*(hw+0.4), platH, 5
            ], 3));
            wg.setIndex([0,1,2,0,2,3]);
            wg.computeVertexNormals();
            temple.add(sh(new THREE.Mesh(wg, M.stone)));
        });

        // Railing
        for (var i = -5; i <= 5; i++) {
            if (Math.abs(i) < 2) continue;
            temple.add(P(sh(C(0.06, 0.06, 0.6, 6, M.stoneL)), i*1.2, platH+0.3, 5.1));
            temple.add(P(B(1.2, 0.08, 0.06, M.stoneL), i*1.2+0.6, platH+0.55, 5.1));
        }

        // ═══ PILLARS ═══
        var pillarH = 5.2;
        var pR = 0.2;
        // Pillar positions: outer corners + inner
        var pPos = [
            [-5, -4], [5, -4], [-5, 4], [5, 4],     // outer corners
            [-1.7, -4], [1.7, -4], [-1.7, 4], [1.7, 4]  // inner
        ];
        pPos.forEach(function(pp) {
            var x = pp[0], z = pp[1];
            // Stone base
            temple.add(P(sh(C(pR*1.6, pR*1.8, 0.12, 12, M.stone)), x, platH+0.06, z));
            temple.add(P(sh(C(pR*1.3, pR*1.5, 0.08, 12, M.stoneL)), x, platH+0.16, z));
            // Red pillar
            temple.add(P(sh(C(pR, pR*1.05, pillarH, 16, M.red)), x, platH+0.2+pillarH/2, z));
            // Gold cap
            temple.add(P(sh(C(pR*1.2, pR*1.05, 0.12, 12, M.gold)), x, platH+0.2+pillarH, z));
            // Dougong
            var dg = mkDougong(0.8);
            dg.position.set(x, platH + 0.2 + pillarH + 0.12, z);
            temple.add(dg);
        });

        // ═══ WALLS - flush with pillars, no gaps ═══
        var wallBottom = platH + 0.2;
        var wallTop = platH + 0.2 + pillarH;
        var wallH = pillarH;

        // Back wall: from x=-5 to x=5, at z=-4
        // Make it slightly wider to overlap with pillar edges
        temple.add(P(sh(B(10.4, wallH, 0.25, M.white)), 0, wallBottom + wallH/2, -4));

        // Side walls: from z=-4 to z=4, at x=±5
        // Height matches pillar top exactly
        [-1, 1].forEach(function(side) {
            temple.add(P(sh(B(0.25, wallH, 8.25, M.white)), side*5, wallBottom + wallH/2, 0));
        });

        // Front wall segments (between pillars, NO DOOR)
        // Left segment: from x=-5 to x=-1.7
        temple.add(P(sh(B(3.15, wallH, 0.25, M.white)), -3.35, wallBottom + wallH/2, 4));
        // Right segment: from x=1.7 to x=5
        temple.add(P(sh(B(3.15, wallH, 0.25, M.white)), 3.35, wallBottom + wallH/2, 4));
        // Upper front wall (above door opening): from x=-1.7 to x=1.7, top portion
        var upperWallH = wallH * 0.35;
        temple.add(P(sh(B(3.2, upperWallH, 0.25, M.white)), 0, wallTop - upperWallH/2, 4));

        // Windows on side walls
        [-1, 1].forEach(function(side) {
            [-2, 0, 2].forEach(function(zOff) {
                var win = mkWindow(1.2, 1.6);
                win.position.set(side * 5.15, wallBottom + wallH * 0.5, zOff);
                win.rotation.y = side * Math.PI / 2;
                temple.add(win);
            });
        });

        // ═══ BEAMS (额枋) - at the top of walls, connecting pillars ═══
        // Front beam
        temple.add(P(sh(B(10.6, 0.3, 0.2, M.redD)), 0, wallTop - 0.12, 4.15));
        // Back beam
        temple.add(P(sh(B(10.6, 0.3, 0.2, M.redD)), 0, wallTop - 0.12, -4.15));
        // Side beams
        [-1, 1].forEach(function(side) {
            temple.add(P(sh(B(0.2, 0.3, 8.5, M.redD)), side * 5.15, wallTop - 0.12, 0));
        });

        // ═══ ROOF ═══
        // Roof dimensions: must extend BEYOND the walls to create eaves
        // Walls are at x=±5, z=±4. Roof should extend to about x=±6.5, z=±5.5
        var roof = buildRoof(6.5, 5.5, 3.2, 1.8);
        roof.position.y = platH + 0.2 + pillarH + 0.4;
        temple.add(roof);

        // ═══ NO DOORS - open entrance ═══

        // ═══ COUPLETS - on the front wall pillars, facing outward ═══
        // Right couplet (广堡深恩似海长) - on right front pillar area, facing right
        var rc = mkCouplet('广堡深恩似海长');
        rc.position.set(5.5, platH + 0.3, 2.5);
        rc.rotation.y = -Math.PI / 2;
        temple.add(rc);

        // Left couplet (侃君厚德如山重) - on left front pillar area, facing left
        var lc = mkCouplet('侃君厚德如山重');
        lc.position.set(-5.5, platH + 0.3, 2.5);
        lc.rotation.y = Math.PI / 2;
        temple.add(lc);

        // Plaque (匾额) - above the entrance
        var plaque = mkPlaque('永怀堂');
        plaque.position.set(0, wallTop + 0.3, 4.5);
        temple.add(plaque);

        // Horizontal scroll (横批) - below plaque
        var hscroll = mkHScroll('祖德流芳');
        hscroll.position.set(0, wallTop - 0.5, 4.5);
        temple.add(hscroll);

        // *** NO interior items ***

        scene.add(temple);

        // ═══ TREES ═══
        [[-9,0,-3,1.1],[8,0,-2,1.0],[-8,0,6,0.9]].forEach(function(p){var t=mkLoquat(p[3]);t.position.set(p[0],p[1],p[2]);scene.add(t)});
        [[9,0,3,1.0],[-10,0,2,1.1],[7,0,-6,0.95]].forEach(function(p){var t=mkPomelo(p[3]);t.position.set(p[0],p[1],p[2]);scene.add(t)});
        [[-11,0,-6,1.2],[11,0,-5,1.1],[-12,0,5,1.0]].forEach(function(p){var t=mkPine(p[3]);t.position.set(p[0],p[1],p[2]);scene.add(t)});
        [[-7,0,-7,1.0],[7,0,-7,1.0],[-7,0,8,0.9],[7,0,8,0.9]].forEach(function(p){var t=mkCypress(p[3]);t.position.set(p[0],p[1],p[2]);scene.add(t)});
        [[-4,0,8,0.8],[5,0,9,0.7],[-10,0,-1,0.75]].forEach(function(p){var t=mkBamboo(p[3]);t.position.set(p[0],p[1],p[2]);scene.add(t)});
        [[-3,0,-8,0.9],[4,0,-8,0.85]].forEach(function(p){var t=mkOsmanthus(p[3]);t.position.set(p[0],p[1],p[2]);scene.add(t)});

        // Lanterns
        [[-2,0,7,1.0],[2,0,7,1.0],[-2,0,2,0.8],[2,0,2,0.8]].forEach(function(p){var l=mkLantern(p[3]);l.position.set(p[0],p[1],p[2]);scene.add(l)});

        // ═══ ANIMATION ═══
        var autoRotate = true;
        function animate() {
            requestAnimationFrame(animate);
            controls.autoRotate = autoRotate;
            controls.autoRotateSpeed = 0.8;
            controls.update();
            renderer.render(scene, camera);
        }

        var loadBar = document.getElementById('load-bar'), prog = 0;
        var li = setInterval(function() {
            prog += Math.random() * 18 + 4;
            if (prog >= 100) {
                prog = 100;
                loadBar.style.width = '100%';
                clearInterval(li);
                setTimeout(function() {
                    document.getElementById('loading').classList.add('done');
                    setTimeout(function() {
                        document.getElementById('loading').style.display = 'none';
                    }, 1000);
                }, 300);
            } else {
                loadBar.style.width = prog + '%';
            }
        }, 80);

        animate();

        addEventListener('resize', function() {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });

        window.resetCamera = function() {
            controls.target.set(0, 3.5, 0);
            camera.position.set(0, 8, 22);
            controls.update();
        };
        window.toggleAutoRotate = function() { autoRotate = !autoRotate; };
        window.toggleInfo = function() { document.getElementById('info-panel').classList.toggle('show'); };

    })();
    }
    </script>
</body>
</html>
